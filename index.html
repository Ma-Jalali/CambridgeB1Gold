<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#FAF6EE"/>
<title>Cambridge B1 Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF6EE;
    --surface:#FFFFFF;
    --surface-glass:rgba(255,255,255,0.72);
    --ink:#211F1B;
    --ink-soft:#7A7468;
    --crimson:#D61439;
    --crimson-dark:#A8102D;
    --gold:#A29261;
    --line:#EDE6D5;
    --radius-lg:26px;
    --radius-md:18px;
    --radius-sm:12px;
    --shadow:0 6px 20px rgba(43,42,38,0.10),0 2px 6px rgba(43,42,38,0.06);
    --font-head:'Lexend',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    --font-body:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    --g-crimson:linear-gradient(135deg,#FF5D7A 0%,#D61439 55%,#A8102D 100%);
    --g-gold:linear-gradient(135deg,#E9CF97 0%,#A2823F 60%,#7C6E48 100%);
    --g-sage:linear-gradient(135deg,#7EE0B4 0%,#33A374 60%,#237456 100%);
    --g-sky:linear-gradient(135deg,#8FCBFB 0%,#3679C8 60%,#25579C 100%);
    --g-plum:linear-gradient(135deg,#D6AEF2 0%,#8E5FC7 60%,#6A3F9C 100%);
    --g-coral:linear-gradient(135deg,#FFB088 0%,#E8703D 60%,#B8501F 100%);
    --g-teal:linear-gradient(135deg,#8CEDE8 0%,#2A9D95 60%,#1D7770 100%);
    --g-rose:linear-gradient(135deg,#FFBAD3 0%,#E85A87 60%,#B83A63 100%);
    --g-indigo:linear-gradient(135deg,#B7C2F7 0%,#5A6FD8 60%,#3E4CA8 100%);
    --g-olive:linear-gradient(135deg,#D8E29E 0%,#8A9A4A 60%,#647032 100%);
    --g-terracotta:linear-gradient(135deg,#F0BB98 0%,#C0603A 60%,#954726 100%);
    --g-slate:linear-gradient(135deg,#C2CDD6 0%,#64758A 60%,#48566A 100%);
  }
  html[data-theme="dark"]{
    --paper:#131210;
    --surface:#1E1C18;
    --surface-glass:rgba(24,22,19,0.72);
    --ink:#F3EFE4;
    --ink-soft:#A69C89;
    --line:#332F27;
    --shadow:0 6px 22px rgba(0,0,0,0.45),0 2px 6px rgba(0,0,0,0.3);
  }
  html[data-textsize="large"] body{zoom:1.12;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{
    font-family:var(--font-body);
    background:var(--line);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  .serif{font-family:var(--font-head);font-weight:800;letter-spacing:-0.02em;}
  button,input{font-family:inherit;}
  #app{
    max-width:560px;margin:0 auto;min-height:100vh;position:relative;
    padding-bottom:230px;
    background:
      radial-gradient(circle at 92% -8%, rgba(214,20,57,0.13), transparent 45%),
      radial-gradient(circle at -8% 22%, rgba(162,146,97,0.16), transparent 42%),
      var(--paper);
    transition:background .2s,color .2s;
  }
  html[data-theme="dark"] #app{
    background:
      radial-gradient(circle at 92% -8%, rgba(214,20,57,0.22), transparent 45%),
      radial-gradient(circle at -8% 22%, rgba(162,146,97,0.20), transparent 42%),
      var(--paper);
  }
  @media (min-width:561px){ #app{ box-shadow:0 0 50px rgba(0,0,0,0.15);} }
  .app-scroll{padding:18px 16px 24px;animation:screenEnter .28s ease;}
  @keyframes screenEnter{ from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

  svg{display:block;}
  .icon-chip svg,.card-icon svg{width:54%;height:54%;}

  /* ---- hero ---- */
  .hero-card{position:relative;overflow:hidden;border-radius:var(--radius-lg);padding:22px 20px 20px;background:var(--g-crimson);color:#fff;box-shadow:0 12px 28px rgba(0,0,0,0.28);margin-bottom:22px;}
  .hero-card .hero-eyebrow,.hero-card .hero-title,.hero-card .hero-tagline{text-shadow:0 1px 2px rgba(0,0,0,0.22);}
  .hero-decor{position:absolute;border-radius:50%;background:rgba(255,255,255,0.16);}
  .hero-decor.d1{width:130px;height:130px;top:-50px;right:-35px;animation:drift 9s ease-in-out infinite;}
  .hero-decor.d2{width:80px;height:80px;bottom:-35px;left:-15px;background:rgba(255,255,255,0.10);animation:drift 11s ease-in-out infinite reverse;}
  .bub{position:absolute;border-radius:50%;background:rgba(255,255,255,0.30);z-index:0;}
  .bub.bb1{width:10px;height:10px;top:24px;left:196px;animation:floaty 5.5s ease-in-out infinite;}
  .bub.bb2{width:6px;height:6px;top:58px;left:216px;animation:floaty 6.5s ease-in-out 1.2s infinite;}
  .bub.bb3{width:8px;height:8px;top:38px;left:236px;animation:floaty 7.5s ease-in-out 2.4s infinite;}
  .bub.bb4{width:5px;height:5px;top:70px;left:190px;background:rgba(255,255,255,0.22);animation:floaty 8s ease-in-out 0.6s infinite;}
  @keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-9px);}}
  @keyframes drift{0%,100%{transform:translate(0,0);}50%{transform:translate(-6px,6px);}}
  .hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;position:relative;z-index:1;}
  .hero-eyebrow{font-family:var(--font-head);font-size:11.5px;text-transform:uppercase;letter-spacing:.09em;opacity:.9;font-weight:700;}
  .hero-title{font-size:26px;margin-top:3px;}
  .hero-book{flex-shrink:0;filter:drop-shadow(0 8px 14px rgba(0,0,0,0.38)) drop-shadow(0 2px 4px rgba(0,0,0,0.25));transform:rotate(3deg);position:relative;z-index:1;}
  .hero-book img{width:58px;height:auto;border-radius:3px;display:block;}
  .hero-tagline{margin-top:16px;font-size:13px;line-height:1.55;opacity:.94;position:relative;z-index:1;max-width:78%;outline:none;}

  /* ---- headers ---- */
  .eyebrow{font-family:var(--font-head);font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);font-weight:700;}
  .big-title{font-size:24px;line-height:1.15;}
  .icon-chip{width:30px;height:30px;border-radius:9px;background:var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--ink);}
  .icon-chip.small{width:26px;height:26px;border-radius:8px;}
  .icon-chip.xl{width:52px;height:52px;border-radius:16px;}
  .icon-chip.glass{background:rgba(255,255,255,0.25);color:#fff;}

  .detail-topline{display:flex;flex-direction:column;gap:4px;padding:2px 2px 12px;}
  .back-btn{align-self:flex-start;border:none;background:none;color:var(--crimson);font-size:16px;font-weight:700;cursor:pointer;padding:4px 0;}
  .back-btn:active{opacity:.6;}
  .breadcrumb{font-size:12.5px;color:var(--ink-soft);line-height:1.5;}
  .crumb{cursor:pointer;}
  .crumb:hover{color:var(--crimson);}
  .crumb.current{color:var(--ink);font-weight:700;}
  .crumb-sep{margin:0 2px;}

  /* ---- page banner ---- */
  .page-banner{position:relative;overflow:hidden;border-radius:var(--radius-lg);padding:20px 18px 22px;margin-bottom:14px;color:#fff;box-shadow:var(--shadow);display:flex;flex-direction:column;justify-content:flex-end;background-size:cover;background-position:center;}
  .page-banner.has-cover{min-height:190px;}
  .banner-top{display:flex;align-items:flex-end;gap:14px;position:relative;z-index:1;}
  .page-title-wrap{flex:1;display:flex;flex-direction:column;gap:9px;padding-top:2px;}
  .page-title{font-family:var(--font-head);font-size:23px;font-weight:800;letter-spacing:-0.01em;outline:none;}

  .page-actions{display:flex;gap:8px;margin:0 0 6px;flex-wrap:wrap;}
  .chip-btn{border:1px solid var(--line);background:var(--surface);border-radius:20px;padding:8px 14px;font-size:12.5px;font-weight:700;color:var(--ink);cursor:pointer;box-shadow:var(--shadow);}
  .chip-btn:active{transform:scale(.96);}
  .chip-btn.danger{color:#C24545;}

  .section-label{font-family:var(--font-head);font-size:12.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;margin:22px 2px 10px;}

  /* ---- course rows ---- */
  .card-list{display:flex;flex-direction:column;gap:11px;}
  .page-card{position:relative;display:flex;align-items:center;gap:12px;padding:14px 15px;border-radius:var(--radius-md);box-shadow:var(--shadow);cursor:pointer;transition:transform .1s ease;color:#fff;}
  .page-card:active{transform:scale(.97);}
  .page-card .card-icon{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,0.24);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;}
  .page-card.neutral{background:var(--surface);color:var(--ink);}
  .page-card.neutral .card-sub{color:var(--ink-soft);}
  .page-card.neutral .card-chevron{color:var(--ink-soft);}
  .page-card.neutral .card-title{text-shadow:none;}
  .card-thumb{width:44px;height:44px;border-radius:12px;background-size:cover;background-position:center;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.08);}
  .card-body{flex:1;min-width:0;}
  .card-title{font-family:var(--font-head);font-size:15.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 3px rgba(0,0,0,0.12);}
  .card-sub{font-size:12.5px;color:rgba(255,255,255,0.88);margin-top:2px;}
  .card-chevron{font-size:19px;color:rgba(255,255,255,0.85);flex-shrink:0;}
  .card-del{position:absolute;top:-6px;right:-6px;width:22px;height:22px;border:none;border-radius:8px;background:#C24545;color:#fff;font-size:10px;font-weight:700;cursor:pointer;z-index:3;box-shadow:0 2px 6px rgba(0,0,0,0.3);}
  .g-crimson{background:var(--g-crimson);} .g-gold{background:var(--g-gold);} .g-sage{background:var(--g-sage);} .g-sky{background:var(--g-sky);}
  .g-plum{background:var(--g-plum);} .g-coral{background:var(--g-coral);} .g-teal{background:var(--g-teal);} .g-rose{background:var(--g-rose);}
  .g-indigo{background:var(--g-indigo);} .g-olive{background:var(--g-olive);} .g-terracotta{background:var(--g-terracotta);} .g-slate{background:var(--g-slate);}

  /* ---- units grid ---- */
  .unit-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .unit-card{position:relative;overflow:visible;border-radius:var(--radius-md);padding:13px 13px 12px;color:#fff;box-shadow:var(--shadow);cursor:pointer;transition:transform .1s ease;display:flex;flex-direction:column;gap:7px;min-height:100px;}
  .unit-card:active{transform:scale(.96);}
  .unit-card-inner{position:absolute;inset:0;border-radius:var(--radius-md);overflow:hidden;}
  .unit-card-top{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:1;}
  .unit-num{font-family:var(--font-head);font-size:10.5px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;opacity:.92;background:rgba(0,0,0,0.16);padding:3px 8px;border-radius:8px;align-self:flex-start;margin-top:4px;}
  .unit-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,rgba(255,255,255,0.45),rgba(255,255,255,0.10));box-shadow:0 3px 6px rgba(0,0,0,0.25), inset 0 1px 1.5px rgba(255,255,255,0.6), inset 0 -1px 1.5px rgba(0,0,0,0.15);flex-shrink:0;}
  .unit-icon svg{width:19px;height:19px;filter:drop-shadow(0 1px 1px rgba(0,0,0,0.3));}
  .unit-name{font-family:var(--font-head);font-size:14px;font-weight:700;line-height:1.28;text-shadow:0 1px 3px rgba(0,0,0,0.15);margin-top:auto;position:relative;z-index:1;}
  .unit-thumb{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.28;}

  .btn{border:1px solid var(--line);background:var(--surface);border-radius:var(--radius-sm);padding:11px 14px;font-size:14px;cursor:pointer;color:var(--ink);font-weight:600;}
  .btn:active{transform:scale(.97);}
  .btn.full{width:100%;margin-top:16px;}
  .btn.primary{background:var(--g-crimson);border:none;color:#fff;font-weight:700;box-shadow:0 8px 18px rgba(214,20,57,0.35);}
  .btn.ghost{border:none;background:none;color:var(--crimson);font-weight:700;padding:10px 4px;}
  .btn.danger-ghost{border:none;background:none;color:#C24545;font-weight:700;}
  .btn.mini{padding:7px 11px;font-size:12.5px;border-radius:9px;}

  /* ---- blocks ---- */
  .blocks{margin-top:6px;}
  .block{position:relative;background:var(--surface);border-radius:var(--radius-md);box-shadow:var(--shadow);padding:15px 17px;margin:12px 0;}
  .block.block-plain{background:none;box-shadow:none;padding:0;margin:22px 0;}
  .block-controls{position:absolute;right:8px;top:8px;display:flex;gap:4px;z-index:2;}
  .block-controls button{border:none;background:var(--paper);border-radius:8px;width:24px;height:24px;font-size:11px;cursor:pointer;color:var(--ink-soft);}
  .block-controls button:active{color:var(--crimson);}

  .rich-field{outline:none;}
  .b-heading-1{font-family:var(--font-head);font-size:21px;font-weight:700;letter-spacing:-0.01em;}
  .b-heading-2{font-family:var(--font-head);font-size:18px;font-weight:700;letter-spacing:-0.01em;}
  .b-heading-3{font-family:var(--font-head);font-size:15.5px;font-weight:600;color:var(--ink-soft);}
  .b-text{font-size:15px;line-height:1.65;white-space:pre-wrap;}
  hr.b-divider{border:none;border-top:1px solid var(--line);}

  .b-bulleted{padding-left:2px;}
  .item-row{display:flex;align-items:flex-start;gap:8px;margin:5px 0;}
  .item-row .dot{color:var(--crimson);margin-top:3px;font-size:14px;}
  .item-row .num{color:var(--crimson);font-weight:700;font-size:13.5px;margin-top:2.5px;min-width:18px;font-family:var(--font-head);}
  .item-text{flex:1;font-size:15px;line-height:1.6;}
  .item-del{border:none;background:none;color:var(--ink-soft);cursor:pointer;font-size:11px;flex-shrink:0;}
  .b-add-item{font-size:13px;color:var(--crimson);cursor:pointer;display:inline-block;margin-top:4px;font-weight:700;}

  .b-toggle{border-left:3px solid var(--gold);padding-left:12px;}
  .b-toggle.open{border-left-color:var(--crimson);}
  .toggle-head{display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:700;font-size:15px;padding:2px 0;}
  .toggle-head .arrow{display:inline-block;transition:transform .15s;color:var(--ink-soft);font-size:14px;}
  .b-toggle.open .toggle-head .arrow{transform:rotate(90deg);}
  .toggle-title{outline:none;}
  .toggle-body{padding:8px 0 2px 2px;}

  .rich-field a, .b-text a, .item-text a, .b-callout-text a, .b-quote-text a{color:var(--crimson);text-decoration:underline;text-underline-offset:2px;cursor:pointer;}
  .block.block-callout{background:none;box-shadow:none;padding:0;margin:12px 0;}
  .b-callout{display:flex;gap:11px;align-items:flex-start;border-radius:var(--radius-md);padding:15px 17px;box-shadow:var(--shadow);}
  .b-callout.no-emoji{gap:0;}
  .b-callout .callout-emoji{font-size:19px;line-height:1.5;flex-shrink:0;cursor:pointer;user-select:none;}
  .b-callout .callout-emoji.locked{cursor:default;}
  .b-callout-text{flex:1;font-size:15px;line-height:1.6;outline:none;}
  .co-white{background:var(--surface);color:var(--ink);} .co-white .b-callout-text{color:var(--ink);}
  .co-gray{background:#F4F1EA;color:#3F3A31;} .co-gray .b-callout-text{color:#3F3A31;}
  .co-yellow{background:#FCF6E0;color:#6A5518;} .co-yellow .b-callout-text{color:#6A5518;}
  .co-red{background:#FCEAED;color:#8A2233;} .co-red .b-callout-text{color:#8A2233;}
  .co-green{background:#E7F4EC;color:#22593B;} .co-green .b-callout-text{color:#22593B;}
  .co-blue{background:#E7F0FB;color:#234A80;} .co-blue .b-callout-text{color:#234A80;}
  .co-purple{background:#F0E9F9;color:#553083;} .co-purple .b-callout-text{color:#553083;}
  html[data-theme="dark"] .co-white{background:#26241F;color:var(--ink);} html[data-theme="dark"] .co-white .b-callout-text{color:var(--ink);}
  html[data-theme="dark"] .co-gray{background:#2A2721;color:#DAD3C4;} html[data-theme="dark"] .co-gray .b-callout-text{color:#DAD3C4;}
  html[data-theme="dark"] .co-yellow{background:#332B12;color:#EFE2AE;} html[data-theme="dark"] .co-yellow .b-callout-text{color:#EFE2AE;}
  html[data-theme="dark"] .co-red{background:#38141C;color:#F4BFC8;} html[data-theme="dark"] .co-red .b-callout-text{color:#F4BFC8;}
  html[data-theme="dark"] .co-green{background:#14291C;color:#B4E4C5;} html[data-theme="dark"] .co-green .b-callout-text{color:#B4E4C5;}
  html[data-theme="dark"] .co-blue{background:#132339;color:#B6D1F3;} html[data-theme="dark"] .co-blue .b-callout-text{color:#B6D1F3;}
  html[data-theme="dark"] .co-purple{background:#241834;color:#D4C0EE;} html[data-theme="dark"] .co-purple .b-callout-text{color:#D4C0EE;}
  .callout-toolbar{display:flex;align-items:center;gap:14px;margin-top:9px;flex-wrap:wrap;}
  .callout-colorbar{display:flex;gap:7px;flex-wrap:wrap;}
  .callout-swatch{width:22px;height:22px;border-radius:7px;border:1px solid rgba(0,0,0,0.14);cursor:pointer;}
  .callout-swatch.picked{box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--ink);}
  .callout-emoji-toggle{font-size:11.5px;font-weight:700;color:var(--crimson);cursor:pointer;background:none;border:none;padding:0;}
  .b-quote{border-left:4px solid var(--crimson);padding:4px 0 4px 16px;}
  .b-quote-text{font-family:var(--font-head);font-size:16.5px;font-weight:500;font-style:italic;line-height:1.5;color:var(--ink);outline:none;}
  .b-quote-cite{font-size:12.5px;color:var(--ink-soft);margin-top:6px;outline:none;}
  .b-quote-cite:before{content:"— ";}
  .b-quote-cite[contenteditable="true"]:empty:before{content:"— " attr(data-placeholder);color:var(--ink-soft);opacity:.6;}

  .link-modal-field{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin:0 0 4px;text-transform:uppercase;letter-spacing:.05em;}

  table.b-table{border-collapse:collapse;width:100%;font-size:13.5px;}
  table.b-table th,table.b-table td{border:1px solid var(--line);padding:6px 9px;text-align:left;outline:none;}
  table.b-table th{background:var(--line);font-weight:700;}
  .table-actions{display:flex;gap:16px;margin-top:8px;}
  .table-actions span{font-size:12px;color:var(--crimson);cursor:pointer;font-weight:700;}

  .embed-label{padding:0 0 10px;font-size:13.5px;font-weight:700;display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .embed-label span:first-child{outline:none;flex:1;}
  .embed-tag{font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:#fff;background:var(--g-crimson);padding:3px 7px;border-radius:6px;flex-shrink:0;}
  .embed-tag.audio-tag{background:var(--g-teal);}
  .embed-tag.video-tag{background:var(--g-crimson);}
  .embed-tag.image-tag{background:var(--g-indigo);}
  .b-embed iframe{width:100%;height:280px;border:none;display:block;border-radius:var(--radius-sm);}
  .b-embed iframe.video-frame{height:360px;}
  .b-embed iframe.audio-frame{height:90px;}
  .embed-empty{padding:26px 10px;text-align:center;color:var(--ink-soft);font-size:13px;background:var(--paper);border-radius:var(--radius-sm);}
  .embed-open-row{padding-top:9px;text-align:right;}
  .embed-open-row a{font-size:12.5px;color:var(--crimson);font-weight:700;text-decoration:none;}
  .embed-input{padding-top:10px;display:flex;gap:8px;}
  .embed-input input{flex:1;padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:var(--paper);color:var(--ink);}
  .b-image img{width:100%;border-radius:var(--radius-sm);display:block;}
  .image-loading{padding:30px 10px;text-align:center;color:var(--ink-soft);font-size:13px;background:var(--paper);border-radius:var(--radius-sm);}

  .add-menu{margin:0 -6px 14px;}
  .move-target-list{margin:0 -6px 14px;}
  .move-target{display:block;width:100%;text-align:left;border:none;background:none;padding:9px 8px;font-size:13px;border-radius:9px;cursor:pointer;color:var(--ink);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .move-target:active{background:var(--line);}

  .search-box{position:relative;margin-bottom:16px;}

  .search-input{width:100%;padding:13px 14px 13px 40px;border:1px solid var(--line);border-radius:var(--radius-md);font-size:15px;background:var(--surface);color:var(--ink);}
  .search-row{display:flex;align-items:center;gap:12px;padding:12px 13px;border-radius:var(--radius-md);background:var(--surface);box-shadow:var(--shadow);margin-bottom:10px;cursor:pointer;}

  .search-title{font-size:14.5px;font-weight:700;}

  .swatch-panel{display:flex;gap:7px;padding:10px;justify-content:center;flex-wrap:wrap;border-bottom:1px solid var(--line);}

/* ============================================================
   SUPABASE-BACKED STORAGE — drop-in replacement for window.storage
   Shared data (page-tree, images) -> Supabase table "app_storage"
   Private data (dark mode, text size, recent words) -> localStorage,
   since those are per-device preferences, not something every visitor should share.
   ============================================================ */
const SUPABASE_URL = 'https://bogagtbkiavnhuohzqzb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_SThek4oq-ojxSq-CqIbTCg_mDvMkAYR';
const SB_TABLE_URL = SUPABASE_URL + '/rest/v1/app_storage';
const SB_HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' };
function lsKey(k){ return 'b1hub_' + k; }

window.storage = {
  get: async function(key, shared){
    if(!shared){
      const v = localStorage.getItem(lsKey(key));
      if(v === null) throw new Error('not found: '+key);
      return { key: key, value: v, shared: false };
    }
    const res = await fetch(SB_TABLE_URL + '?key=eq.' + encodeURIComponent(key) + '&select=value', { headers: SB_HEADERS });
    if(!res.ok) throw new Error('Supabase read failed ('+res.status+')');
    const rows = await res.json();
    if(!rows.length) throw new Error('not found: '+key);
    return { key: key, value: rows[0].value, shared: true };
  },
  set: async function(key, value, shared){
    if(!shared){
      localStorage.setItem(lsKey(key), value);
      return { key: key, value: value, shared: false };
    }
    const res = await fetch(SB_TABLE_URL, {
      method: 'POST',
      headers: Object.assign({}, SB_HEADERS, { 'Prefer': 'resolution=merge-duplicates,return=representation' }),
      body: JSON.stringify([{ key: key, value: value, updated_at: new Date().toISOString() }])
    });
    if(!res.ok) throw new Error('Supabase write failed ('+res.status+')');
    return { key: key, value: value, shared: true };
  },
  delete: async function(key, shared){
    if(!shared){
      localStorage.removeItem(lsKey(key));
      return { key: key, deleted: true, shared: false };
    }
    const res = await fetch(SB_TABLE_URL + '?key=eq.' + encodeURIComponent(key), { method: 'DELETE', headers: SB_HEADERS });
    if(!res.ok) throw new Error('Supabase delete failed ('+res.status+')');
    return { key: key, deleted: true, shared: true };
  },
  list: async function(prefix, shared){
    if(!shared){
      const keys = [];
      for(let i=0;i<localStorage.length;i++){
        const k = localStorage.key(i);
        if(k.indexOf('b1hub_')===0){
          const bare = k.slice(6);
          if(!prefix || bare.indexOf(prefix)===0) keys.push(bare);
        }
      }
      return { keys: keys, prefix: prefix, shared: false };
    }
    let url = SB_TABLE_URL + '?select=key';
    if(prefix) url += '&key=like.' + encodeURIComponent(prefix + '*');
    const res = await fetch(url, { headers: SB_HEADERS });
    if(!res.ok) throw new Error('Supabase list failed ('+res.status+')');
    const rows = await res.json();
    return { keys: rows.map(function(r){ return r.key; }), prefix: prefix, shared: true };
  }
};

function migrate(){
  if(!ICONS[state.icon]) state.icon = EMOJI_TO_ICON[state.icon] || 'cap';
  if(!('tagline' in state) || !state.tagline) state.tagline = DEFAULT_TAGLINE;
  if(!('heroColor' in state)) state.heroColor = null;
  if(!('bookImg' in state)) state.bookImg = null;
  (function walk(pages){
    pages.forEach(function(p){
      if(!ICONS[p.icon]) p.icon = EMOJI_TO_ICON[p.icon] || 'page';
      if(!('colorFamily' in p)) p.colorFamily = null;
      if(!('cover' in p)) p.cover = '';
      if(p.children && p.children.length) walk(p.children);
    });
  })(state.pages);
  state.pages.forEach(function(p){
    if(!('section' in p) || !p.section){
      p.section = /^unit\s*\d+/i.test(p.title.trim()) ? 'units' : 'general';
    }
  });
  UNIT_NAMES.forEach(function(name, i){
    const num = i+1;
    const re = new RegExp('^unit\\s*'+num+'\\b','i');
    const exists = state.pages.some(function(p){ return p.section==='units' && re.test(p.title.trim()); });
    if(!exists){
      state.pages.push({id:uid(), title:name, icon:UNIT_ICONS[i], section:'units', colorFamily:null, cover:'', blocks:[], children:[]});
    }
  });
  const generals = state.pages.filter(function(p){ return p.section!=='units'; });
  const units = state.pages.filter(function(p){ return p.section==='units'; });
  units.sort(function(a,b){
    const na = parseInt((a.title.match(/^unit\s*(\d+)/i)||[])[1]||'999',10);
    const nb = parseInt((b.title.match(/^unit\s*(\d+)/i)||[])[1]||'999',10);
    return na-nb;
  });
  state.pages = generals.concat(units);
}

async function loadState(){
  try{
    const res = await window.storage.get('page-tree', true);
    state = JSON.parse(res.value);
    if(!('pin' in state)) state.pin = null;
    if(!('byline' in state) || !state.byline) state.byline = 'Mark Jalali';
  }catch(e){
    state = buildSeed();
  }
  migrate();
  persist();
  try{
    const ui = await window.storage.get('ui-prefs', false);
    const prefs = JSON.parse(ui.value);
    darkMode = !!prefs.dark;
    textSize = prefs.textSize || 'normal';
  }catch(e){ darkMode = false; textSize = 'normal'; }
  try{
    const dr = await window.storage.get('dict-recent', false);
    dictRecent = JSON.parse(dr.value) || [];
  }catch(e){ dictRecent = []; }
  applyTheme();
  render();
}

  if(meta) meta.setAttribute('content', darkMode ? '#131210' : '#FAF6EE');
}

/* ================= tree helpers ================= */
function findPage(pages, id){
  for(const p of pages){
    if(p.id===id) return p;
    if(p.children && p.children.length){ const f=findPage(p.children,id); if(f) return f; }
  }
  return null;
}
function findPageParentLoc(pages, id){
  for(let i=0;i<pages.length;i++){
    if(pages[i].id===id) return {arr:pages, idx:i};
    if(pages[i].children && pages[i].children.length){ const f=findPageParentLoc(pages[i].children,id); if(f) return f; }
  }
  return null;
}
function findBlockNode(blocks, id){
  for(const b of blocks){
    if(b.id===id) return b;
    if(b.type==='toggle'){ const f=findBlockNode(b.blocks,id); if(f) return f; }
  }
  return null;
}
function findBlockParentArray(blocks, id){
  for(let i=0;i<blocks.length;i++){
    if(blocks[i].id===id) return blocks;
    if(blocks[i].type==='toggle'){ const f=findBlockParentArray(blocks[i].blocks,id); if(f) return f; }
  }
  return null;
}
function findBlockLocation(blocks, id, ancestors){
  ancestors = ancestors || [];
  for(let i=0;i<blocks.length;i++){
    if(blocks[i].id===id) return { arr: blocks, idx: i, ancestors: ancestors };
    if(blocks[i].type==='toggle'){
      const found = findBlockLocation(blocks[i].blocks, id, ancestors.concat([blocks[i]]));
      if(found) return found;
    }
  }
  return null;
}
function releaseFromToggle(blockId){
  const page = currentPage();
  const loc = findBlockLocation(page.blocks, blockId, []);
  if(!loc || !loc.ancestors.length) return;
  const parentToggle = loc.ancestors[loc.ancestors.length-1];
  const block = loc.arr.splice(loc.idx, 1)[0];
  const grandAncestors = loc.ancestors.slice(0, -1);
  const targetArr = grandAncestors.length ? grandAncestors[grandAncestors.length-1].blocks : page.blocks;
  const toggleIdx = targetArr.findIndex(function(b){ return b.id===parentToggle.id; });
  targetArr.splice(toggleIdx+1, 0, block);
  persist(); render();
}
function startMoveBlock(blockId){ moveBlockId = blockId; render(); }
function cancelMoveBlock(){ moveBlockId = null; render(); }
function stripHtmlPreview(html){
  const t = String(html||'').replace(/<[^>]*>/g,'').trim();
  return t.length>40 ? t.slice(0,40)+'…' : (t||'(empty)');
}
function blockPreviewLabel(b){
  switch(b.type){
    case 'heading': return (b.level===1?'H1':b.level===2?'H2':'H3')+' heading: '+stripHtmlPreview(b.text);
    case 'text': return 'Text: '+stripHtmlPreview(b.text);
    case 'bulleted': return 'Bulleted list';
    case 'numbered': return 'Numbered list';
    case 'toggle': return 'Toggle: '+(b.title||'Untitled');
    case 'table': return 'Table';
    case 'callout': return 'Callout: '+stripHtmlPreview(b.text);
    case 'quote': return 'Quote: '+stripHtmlPreview(b.text);
    case 'image': return 'Image: '+(b.label||'Untitled image');
    case 'embed': return 'Video: '+(b.label||'Untitled media');
    case 'audio': return 'Audio: '+(b.label||'Untitled audio');
    case 'divider': return 'Divider';
  }
  return 'Block';
}
function collectSubtreeIds(block, out){
  out.push(block.id);
  if(block.type==='toggle'){ block.blocks.forEach(function(c){ collectSubtreeIds(c, out); }); }
}
function flattenBlocksForMove(blocks, depth, out, excludeIds){
  blocks.forEach(function(b){
    if(excludeIds.indexOf(b.id)!==-1) return;
    out.push({ id:b.id, depth:depth, label: blockPreviewLabel(b) });
    if(b.type==='toggle') flattenBlocksForMove(b.blocks, depth+1, out, excludeIds);
  });
}
function confirmMoveTo(targetId){
  const page = currentPage();
  const loc = findBlockLocation(page.blocks, moveBlockId, []);
  if(!loc) return;
  const block = loc.arr.splice(loc.idx, 1)[0];
  if(!targetId){
    page.blocks.unshift(block);
  }else{
    const targetLoc = findBlockLocation(page.blocks, targetId, []);
    const idx = targetLoc.arr.findIndex(function(b){ return b.id===targetId; });
    targetLoc.arr.splice(idx+1, 0, block);
  }
  moveBlockId = null;
  persist(); render();
}
function currentPage(){
  if(!pageStack.length) return null;
  return findPage(state.pages, pageStack[pageStack.length-1]);
}
function generalPages(){ return state.pages.filter(function(p){ return p.section!=='units'; }); }
function unitPages(){ return state.pages.filter(function(p){ return p.section==='units'; }); }
function sectionIndexOf(page){
  const list = (page.section==='units') ? unitPages() : generalPages();
  return list.findIndex(function(p){ return p.id===page.id; });
}
function unitParts(title){
  const m = title.match(/^Unit\s*(\d+)\s*[—–-]+\s*(.+)$/i);
  return m ? {num:m[1], name:m[2]} : null;
}
function collectImgKeys(blocks, out){
  blocks.forEach(function(b){
    if(b.type==='image' && b.imgKey) out.push(b.imgKey);
    if(b.type==='toggle') collectImgKeys(b.blocks, out);
  });
}
function collectPageImgKeys(p, out){
  collectImgKeys(p.blocks||[], out);
  (p.children||[]).forEach(function(c){ collectPageImgKeys(c, out); });
}
function deleteImgKeys(keys){
  keys.forEach(function(k){
    window.storage.delete(k, true).catch(function(){});
    delete imageCache[k];
  });
}

function pathToRoot(id){
  function search(pages, trail){
    for(const p of pages){
      const t = trail.concat([p.id]);
      if(p.id===id) return t;
      if(p.children && p.children.length){ const r=search(p.children,t); if(r) return r; }
    }
    return null;
  }
  return search(state.pages, []) || [];
}
function openFromSearch(id){ selectedTab='home'; pageStack = pathToRoot(id); searchQuery=''; render(); window.scrollTo(0,0); }

/* ================= image compression & upload ================= */
function compressImageFile(file, maxW, quality, cb){
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = function(){
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0,0,w,h);
      ctx.drawImage(img, 0, 0, w, h);
      cb(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = function(){ alert('That file could not be read as an image.'); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function handleImageUpload(blockId, input){
  const file = input.files && input.files[0];
  if(!file) return;
  compressImageFile(file, 1000, 0.78, function(dataUrl){
    const key = 'img-'+uid();
    window.storage.set(key, dataUrl, true).then(function(){
      const page = currentPage();
      const node = findBlockNode(page.blocks, blockId);
      if(!node) return;
      if(node.imgKey){ deleteImgKeys([node.imgKey]); }
      node.imgKey = key;
      imageCache[key] = dataUrl;
      persist(); render();
    }).catch(function(){
      alert('The image could not be saved. It may be too large — try a smaller photo.');
    });
  });
}
function handleBookImage(input){
  const file = input.files && input.files[0];
  if(!file) return;
  compressImageFile(file, 160, 0.8, function(dataUrl){
    state.bookImg = dataUrl;
    persist(); render();
  });
}
function resetBookImage(){ state.bookImg = null; persist(); render(); }
function ensureImageLoaded(key){
  if(imageCache[key] || imagePending[key]) return;
  imagePending[key] = true;
  window.storage.get(key, true).then(function(res){
    imageCache[key] = res.value;
    delete imagePending[key];
    render();
  }).catch(function(){
    imageCache[key] = 'ERR';
    delete imagePending[key];
    render();
  });
}

/* ================= backup / restore ================= */
async function exportBackup(){
  try{
    const bundle = { state: state, images: {} };
    try{
      const listed = await window.storage.list('img-', true);
      const keys = (listed && listed.keys) ? listed.keys : [];
      for(const k of keys){
        const keyName = typeof k === 'string' ? k : k.key;
        try{
          const res = await window.storage.get(keyName, true);
          bundle.images[keyName] = res.value;
        }catch(e){}
      }
    }catch(e){}
    const blob = new Blob([JSON.stringify(bundle)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'class-hub-backup-'+new Date().toISOString().slice(0,10)+'.json';
    a.click();
  }catch(e){
    alert('Backup failed: '+e.message);
  }
}
function handleImportFile(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(e){
    try{
      const data = JSON.parse(e.target.result);
      const newState = data.state || data;
      if(!newState.pages || !Array.isArray(newState.pages)) throw new Error('Not a valid backup file.');
      if(!confirm('Replace ALL current content with this backup? This cannot be undone.')) return;
      state = newState;
      migrate();
      persist();
      if(data.images){
        for(const k in data.images){
          try{ await window.storage.set(k, data.images[k], true); imageCache[k]=data.images[k]; }catch(err){}
        }
      }
      render();
      alert('Backup restored.');
    }catch(err){
      alert('Could not import: '+err.message);
    }
  };
  reader.readAsText(file);
}

function createBlock(type){
  const id = uid();
  switch(type){
    case 'heading1': return {id, type:'heading', level:1, text:'Heading 1'};
    case 'heading2': return {id, type:'heading', level:2, text:'Heading 2'};
    case 'heading3': return {id, type:'heading', level:3, text:'Heading 3'};
    case 'text': return {id, type, text:'Type something…'};
    case 'bulleted': return {id, type, items:['List item']};
    case 'numbered': return {id, type, items:['List item']};
    case 'divider': return {id, type};
    case 'toggle': return {id, type, title:'Toggle', open:true, blocks:[]};
    case 'table': return {id, type, headers:['Column 1','Column 2'], rows:[['','']]};
    case 'embed': return {id, type, label:'', url:''};
    case 'audio': return {id, type, label:'', url:''};
    case 'image': return {id, type, label:'', imgKey:''};
    case 'callout': return {id, type, emoji:'💡', color:'co-yellow', text:'Type your note here…'};
    case 'quote': return {id, type, text:'Add a quote…', cite:''};
  }
}

function convertDriveUrl(url){
  if(!url) return null;
  let m;
  if(m = url.match(/\/file\/d\/([^/]+)/)) return 'https://drive.google.com/file/d/'+m[1]+'/preview';
  if(m = url.match(/\/document\/d\/([^/]+)/)) return 'https://docs.google.com/document/d/'+m[1]+'/preview';
  if(m = url.match(/\/spreadsheets\/d\/([^/]+)/)) return 'https://docs.google.com/spreadsheets/d/'+m[1]+'/preview';
  if(m = url.match(/\/presentation\/d\/([^/]+)/)) return 'https://docs.google.com/presentation/d/'+m[1]+'/preview';
  if(m = url.match(/[?&]id=([^&]+)/)) return 'https://drive.google.com/file/d/'+m[1]+'/preview';
  return url;
}
function convertDriveImageUrl(url){
  if(!url) return null;
  let m;
  if(m = url.match(/\/file\/d\/([^/]+)/)) return 'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w1600';
  if(m = url.match(/[?&]id=([^&]+)/)) return 'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w1600';
  return url;
}

/* ================= dictionary ================= */
function addRecentWord(w){
  w = w.toLowerCase();
  dictRecent = [w].concat(dictRecent.filter(function(x){ return x!==w; })).slice(0,8);
  persistRecent();
}
async function lookupWord(w){
  w = (w||'').trim();
  if(!w) return;
  dictQuery = w;
  dictLoading = true; dictError = null; dictResult = null; dictSuggestions = []; dictAttribution = null;
  render();
  let handled = false;
  try{ handled = await tryFreeDict(w); }catch(e){ handled = false; }
  if(!handled){ try{ handled = await tryWiktionary(w); }catch(e){ handled = false; } }
  if(!handled){ try{ handled = await tryAiDict(w); }catch(e){ handled = false; } }
  if(!handled){
    try{
      const sr = await fetch('https://api.datamuse.com/sug?s='+encodeURIComponent(w.toLowerCase())+'&max=8');
      const sug = await sr.json();
      dictSuggestions = (sug||[]).map(function(x){ return x.word; }).filter(function(x){ return x !== w.toLowerCase(); }).slice(0,6);
      if(dictSuggestions.length) dictError = 'No entry found for “'+w+'”. Did you mean one of these?';
    }catch(e){}
    if(!dictError) dictError = 'No entry found for “'+w+'”. Check the spelling and try again.';
  }
  dictLoading = false;
  render();
}
async function tryFreeDict(w){
  const r = await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(w.toLowerCase()));
  if(!r.ok) return false;
  const data = await r.json();
  if(!Array.isArray(data) || !data.length) return false;
  dictResult = data;
  addRecentWord(w);
  return true;
}
async function tryWiktionary(w){
  const wik = await wiktionaryLookup(w);
  if(!wik) return false;
  dictResult = wik;
  dictAttribution = 'wiktionary';
  addRecentWord(w);
  return true;
}
async function tryAiDict(w){
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:1000,
      messages:[{role:'user', content:
        'You are a learner\'s dictionary for B1 (intermediate) English students. Define: "'+w.replace(/"/g,'')+'"\n' +
        'Reply ONLY with minified JSON, no markdown fences, no other text.\n' +
        'If it is a real English word, phrase, phrasal verb or idiom:\n' +
        '{"found":true,"word":"the word","phonetic":"/IPA/","meanings":[{"partOfSpeech":"noun","definitions":[{"definition":"simple definition in easy English, max 20 words","example":"a natural example sentence"}],"synonyms":["synonym1"]}]}\n' +
        'Rules: max 3 meanings, max 3 definitions per meaning, exactly 1 example per definition, max 6 synonyms total, definitions must use simple B1-level vocabulary.\n' +
        'If it is NOT a real English word or phrase:\n' +
        '{"found":false,"suggestions":["up to 5 real English words the student probably meant"]}'
      }]
    })
  });
  if(!response.ok) return false;
  const data = await response.json();
  const text = (data.content||[]).filter(function(c){ return c.type==='text'; }).map(function(c){ return c.text; }).join('');
  const clean = text.replace(/```json|```/g,'').trim();
  const parsed = JSON.parse(clean);
  if(parsed.found){
    dictResult = [{
      word: parsed.word || w.toLowerCase(),
      phonetic: parsed.phonetic || '',
      phonetics: [],
      meanings: (parsed.meanings||[]).map(function(m){
        return {
          partOfSpeech: m.partOfSpeech || '',
          definitions: (m.definitions||[]).map(function(d){ return {definition:d.definition||'', example:d.example||''}; }).filter(function(d){ return d.definition; }),
          synonyms: m.synonyms || []
        };
      }).filter(function(m){ return m.definitions.length; })
    }];
    if(!dictResult[0].meanings.length) return false;
    dictAttribution = 'ai';
    addRecentWord(w);
    return true;
  }
  if(parsed.suggestions && parsed.suggestions.length){
    dictSuggestions = parsed.suggestions.slice(0,6);
    dictError = 'No entry found for “'+w+'”. Did you mean one of these?';
    return true;
  }
  return false;
}
function speakWord(w){
  try{
    const u = new SpeechSynthesisUtterance(w);
    u.lang = 'en-GB';
    u.rate = 0.85;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  }catch(e){}
}
function stripHtml(s){
  return String(s||'')
    .replace(/<[^>]*>/g,'')
    .replace(/&nbsp;/g,' ')
    .replace(/&amp;/g,'&')
    .replace(/&lt;/g,'<')
    .replace(/&gt;/g,'>')
    .replace(/&#39;/g,"'")
    .replace(/&quot;/g,'"')
    .replace(/\s+/g,' ')
    .trim();
}
async function wiktionaryLookup(w){
  const title = encodeURIComponent(w.trim().toLowerCase().replace(/\s+/g,'_'));
  const r = await fetch('https://en.wiktionary.org/api/rest_v1/page/definition/'+title+'?redirect=true');
  if(!r.ok) return null;
  const data = await r.json();
  const sections = data.en;
  if(!sections || !sections.length) return null;
  const meanings = [];
  sections.slice(0,5).forEach(function(sec){
    const defs = (sec.definitions||[]).map(function(d){
      const text = stripHtml(d.definition);
      let example = '';
      if(d.parsedExamples && d.parsedExamples.length) example = stripHtml(d.parsedExamples[0].example);
      else if(d.examples && d.examples.length) example = stripHtml(d.examples[0]);
      return {definition:text, example:example};
    }).filter(function(d){ return d.definition; });
    if(defs.length) meanings.push({partOfSpeech:(sec.partOfSpeech||'').toLowerCase(), definitions:defs, synonyms:[]});
  });
  if(!meanings.length) return null;
  return [{word:w.trim().toLowerCase(), phonetic:'', phonetics:[], meanings:meanings}];
}
function lookupFromInput(){
  const inp = document.getElementById('dictInput');
  if(inp) lookupWord(inp.value);
}

function toggleColorSwatch(kind){
  const panel = document.getElementById('colorSwatchPanel');
  if(panel.style.display==='flex'){ panel.style.display='none'; return; }
  const swatches = kind==='highlight' ? HIGHLIGHTS : TEXTCOLORS;
  panel.innerHTML = swatches.map(function(s){
    const style = kind==='highlight' ? ('background:'+s.value+';') : ('color:'+s.value+';background:var(--surface);');
    return '<button style="'+style+'" onmousedown="event.preventDefault()" onclick="applyColor(\''+kind+'\',\''+s.value+'\')">'+s.label+'</button>';
  }).join('');

function startLinkFromToolbar(){
  const sel = window.getSelection();
  linkHadSelection = sel && sel.rangeCount>0 && !sel.isCollapsed;
  savedLinkRange = (sel && sel.rangeCount>0) ? sel.getRangeAt(0).cloneRange() : null;
  linkDraftText = linkHadSelection ? sel.toString() : '';
  linkDraftUrl = '';
  showLinkModal = true;
  paintLinkModal();
}
function onLinkUrlInput(v){ linkDraftUrl = v; }
function onLinkTextInput(v){ linkDraftText = v; }
function closeLinkModal(){ showLinkModal = false; savedLinkRange = null; paintLinkModal(); }
function paintLinkModal(){
  const root = document.getElementById('linkModalRoot');
  root.innerHTML = showLinkModal ? renderLinkModal() : '';
  if(showLinkModal){
    const inp = root.querySelector('.link-url-input');
    if(inp) inp.focus();
  }
}
function normalizeUrl(u){
  u = (u||'').trim();
  if(!u) return '';
  if(/^(https?:|mailto:)/i.test(u)) return u;
  return 'https://'+u;
}
function confirmLink(){
  const url = normalizeUrl(linkDraftUrl);
  if(!url){ closeLinkModal(); return; }
  const text = (linkDraftText||'').trim() || url;
  const anchor = '<a href="'+escapeAttr(url)+'" target="_blank" rel="noopener">'+escapeHtml(text)+'</a>';
  const sel = window.getSelection();
  if(savedLinkRange){
    sel.removeAllRanges();
    sel.addRange(savedLinkRange);
  }
  try{
    if(linkHadSelection){
      document.execCommand('insertHTML', false, anchor);
    }else{
      document.execCommand('insertHTML', false, anchor+'&nbsp;');
    }
  }catch(e){}
  const active = document.activeElement;
  if(active && active.dataset && active.dataset.blockId) syncFromElement(active);
  showLinkModal = false; savedLinkRange = null;
  paintLinkModal();
  scheduleSave();
}

/* ================= render ================= */
function render(){
  const app = document.getElementById('app');
  let body;
  if(selectedTab==='home') body = renderHome();
  else if(selectedTab==='dictionary') body = renderDictionary();
  else if(selectedTab==='search') body = renderSearch();
  else body = renderSettings();
  app.innerHTML =
    '<div class="app-scroll">'+body+'</div>' +
    renderTabBar() +
    (customizeFor ? renderCustomizeModal() : '') +
    (showNewPageModal ? renderNewPageModal() : '') +
    (showPinSetModal ? renderPinSetModal() : '') +
    (showPinGateModal ? renderPinGateModal() : '') +
    (addMenuOpenFor ? renderAddMenu(addMenuOpenFor) : '') +
    (moveBlockId ? renderMoveModal() : '');
  paintLinkModal();
  if(showNewPageModal){
    const inp = document.querySelector('.new-page-title-input');
    if(inp) inp.focus();
  }
  if(showPinSetModal){
    const inp = document.querySelector('.pin-set-input');
    if(inp) inp.focus();
  }
  if(showPinGateModal){
    const inp = document.querySelector('.pin-gate-input');
    if(inp) inp.focus();
  }
  if(showLinkModal){
    const inp = document.querySelector('.link-url-input');
    if(inp) inp.focus();
  }
}

function renderTabBar(){
  const tabs = [
    {id:'home', icon:'home', label:'Home'},
    {id:'dictionary', icon:'dictionary', label:'Dictionary'},
    {id:'search', icon:'search', label:'Search'},
    {id:'settings', icon:'gear', label:'Settings'}
  ];
  return '<div class="tab-bar">' +
    tabs.map(function(t){
      return '<div class="tab-item '+(selectedTab===t.id?'active':'')+'" onclick="switchTab(\''+t.id+'\')">' +
        '<div class="tab-icon">'+iconHTML(t.icon)+'</div><div class="tab-label">'+t.label+'</div></div>';
    }).join('') +

function pageSubtitle(p){
  if(p.children && p.children.length){
    return p.children.length + (p.children.length===1 ? ' page inside' : ' pages inside');
  }
  const n = p.blocks ? p.blocks.length : 0;
  if(n===0) return editMode ? 'Empty — tap to add' : 'No content yet';
  return n+(n===1?' section':' sections');
}
function delOverlay(p){
  return editMode ? '<button class="card-del" onclick="event.stopPropagation();deletePage(\''+p.id+'\')" title="Delete">✕</button>' : '';
}
function pageCard(p, i, neutral){
  const cls = pageColorClass(p, i);
  const hasCover = p.cover && p.cover.trim();
  let media;
  if(hasCover){
    media = '<div class="card-thumb" style="background-image:url(\''+escapeAttr(convertDriveImageUrl(p.cover))+'\')"></div>';
  }else if(neutral){
    media = '<div class="card-icon" style="background:'+GRAD_VAR[cls]+';">'+iconHTML(p.icon)+'</div>';
  }else{
    media = '<div class="card-icon">'+iconHTML(p.icon)+'</div>';
  }
  return '<div class="page-card '+(neutral?'neutral':cls)+'" onclick="openPage(\''+p.id+'\')">' +
    delOverlay(p) + media +
    '<div class="card-body"><div class="card-title">'+escapeHtml(p.title)+'</div>' +
    '<div class="card-sub">'+pageSubtitle(p)+'</div></div>' +
    '<div class="card-chevron">›</div></div>';
}
function unitCard(p, i){
  const cls = pageColorClass(p, i);
  const parts = unitParts(p.title);
  const hasCover = p.cover && p.cover.trim();
  const num = parts ? ('Unit '+parts.num) : 'Page';
  const name = parts ? parts.name : p.title;
  return '<div class="unit-card '+cls+'" onclick="openPage(\''+p.id+'\')">' +
    (hasCover ? '<div class="unit-card-inner"><div class="unit-thumb" style="background-image:url(\''+escapeAttr(convertDriveImageUrl(p.cover))+'\')"></div></div>' : '') +
    delOverlay(p) +
    '<div class="unit-card-top"><span class="unit-num">'+escapeHtml(num)+'</span><span class="unit-icon">'+iconHTML(p.icon)+'</span></div>' +
    '<div class="unit-name">'+escapeHtml(name)+'</div>' +

}

function renderBreadcrumb(){
  let html = '<span class="crumb" onclick="goHome()">'+escapeHtml(state.title)+'</span>';
  pageStack.forEach(function(id,j){
    const p = findPage(state.pages, id);
    const title = p ? p.title : '…';
    const isLast = j===pageStack.length-1;
    html += ' <span class="crumb-sep">›</span> ';
    html += isLast
      ? '<span class="crumb current">'+escapeHtml(title)+'</span>'
      : '<span class="crumb" onclick="goToStackIndex('+j+')">'+escapeHtml(title)+'</span>';
  });

function renderPageDetail(){
  const id = pageStack[pageStack.length-1];

  const loc = findPageParentLoc(state.pages, page.id);
  const isTopLevel = loc && loc.arr===state.pages;
  const idx = isTopLevel ? sectionIndexOf(page) : (loc ? loc.idx : undefined);
  const cls = pageColorClass(page, idx);
  const hasCover = page.cover && page.cover.trim();
  const coverUrl = hasCover ? convertDriveImageUrl(page.cover) : null;
  const bannerStyle = hasCover
    ? ' style="background-image:linear-gradient(180deg, rgba(0,0,0,0.05), rgba(0,0,0,0.6)), url(\''+escapeAttr(coverUrl)+'\');"'
    : '';

    '<div class="detail-topline"><button class="back-btn" onclick="goBack()">‹ Back</button><div class="breadcrumb">'+renderBreadcrumb()+'</div></div>' +

        '<div class="icon-chip xl glass"'+(editMode?' onclick="openCustomize(\''+page.id+'\')" style="cursor:pointer;"':'')+'>'+iconHTML(page.icon)+'</div>' +
        '<div class="page-title-wrap">' +
          '<div class="page-title serif" contenteditable="'+editMode+'" onkeydown="if(event.key===\'Enter\'){event.preventDefault();this.blur();}" oninput="onPageTitleInput(\''+page.id+'\',this.innerText)" onblur="render()">'+escapeHtml(page.title)+'</div>' +
        '</div>' +
      '</div>' +

  if(editMode){
    html += '<div class="page-actions">' +
      '<button class="chip-btn" onclick="openCustomize(\''+page.id+'\')">✎ Edit title & style</button>' +
      '<button class="chip-btn" onclick="openNewPageModal(\''+page.id+'\')">+ Sub-page</button>' +
      '<button class="chip-btn danger" onclick="deletePage(\''+page.id+'\')">Delete</button>' +
    '</div>';

  if(page.children && page.children.length){
    html += '<div class="section-label">Inside this page</div><div class="card-list">' +
      page.children.map(function(c,i){ return pageCard(c,i,false); }).join('') + '</div>';
  }

/* ---- dictionary tab ---- */
function renderDictionary(){
  let html = '' +
    '<div class="eyebrow" style="margin-bottom:4px;">English–English</div>' +
    '<div class="big-title serif" style="margin-bottom:16px;">Dictionary</div>' +
    '<div class="dict-search-row">' +
      '<div class="search-box"><span class="search-icon">'+iconHTML('search')+'</span>' +
      '<input class="search-input" id="dictInput" type="text" placeholder="Look up a word…" value="'+escapeAttr(dictQuery)+'" onkeydown="if(event.key===\'Enter\'){lookupWord(this.value);}"/></div>' +
      '<button class="dict-go" onclick="lookupFromInput()">Go</button>' +
    '</div>';
  if(dictRecent.length){
    html += '<div class="recent-chips">' + dictRecent.map(function(w){
      return '<button class="recent-chip" onclick="lookupWord(\''+escapeAttr(w)+'\')">'+escapeHtml(w)+'</button>';
    }).join('') + '</div>';
  }
  if(dictLoading){
    html += '<div class="empty-note">Looking up “'+escapeHtml(dictQuery)+'”…</div>';
  }
  if(dictError){
    html += '<div class="dict-card"><div style="font-size:14px;line-height:1.6;">'+escapeHtml(dictError)+'</div>' +
      (dictSuggestions.length ? ('<div class="eyebrow" style="margin:12px 0 8px;">Did you mean</div><div class="recent-chips" style="margin-bottom:2px;">' +
        dictSuggestions.map(function(s){ return '<button class="recent-chip" onclick="lookupWord(\''+escapeAttr(s)+'\')">'+escapeHtml(s)+'</button>'; }).join('') + '</div>') : '') +
    '</div>';
  }
  if(dictResult){
    const entry = dictResult[0];
    const phon = entry.phonetic || (entry.phonetics||[]).map(function(p){return p.text;}).filter(Boolean)[0] || '';
    const audioObj = (entry.phonetics||[]).filter(function(p){ return p.audio; })[0];
    html += '<div class="dict-card">' +
      '<div class="dict-word-row">' +
        '<span class="dict-word">'+escapeHtml(entry.word)+'</span>' +
        (phon ? '<span class="dict-phon">'+escapeHtml(phon)+'</span>' : '') +
        (audioObj ? '<button class="dict-audio-btn" onclick="playAudio(\''+escapeAttr(audioObj.audio)+'\')" title="Pronounce">▶</button>' : '<button class="dict-audio-btn" onclick="speakWord(\''+escapeAttr(entry.word)+'\')" title="Pronounce">▶</button>') +
      '</div>';
    dictResult.forEach(function(en){
      (en.meanings||[]).forEach(function(m){
        html += '<div class="pos-tag">'+escapeHtml(m.partOfSpeech||'')+'</div>';
        (m.definitions||[]).slice(0,4).forEach(function(d, di){
          html += '<div class="def-item"><span class="def-num">'+(di+1)+'</span>'+escapeHtml(d.definition||'') +
            (d.example ? '<span class="def-example">“'+escapeHtml(d.example)+'”</span>' : '') +
          '</div>';
        });
      });
    });
    var syns = [];
    dictResult.forEach(function(en){ (en.meanings||[]).forEach(function(m){
      (m.synonyms||[]).forEach(function(s){ if(syns.indexOf(s)===-1) syns.push(s); });
      (m.definitions||[]).forEach(function(d){ (d.synonyms||[]).forEach(function(s){ if(syns.indexOf(s)===-1) syns.push(s); }); });
    }); });
    if(syns.length){
      html += '<div class="eyebrow" style="margin:14px 0 8px;">Similar words — tap to look up</div><div class="recent-chips" style="margin-bottom:2px;">' +
        syns.slice(0,8).map(function(s){ return '<button class="recent-chip" onclick="lookupWord(\''+escapeAttr(s)+'\')">'+escapeHtml(s)+'</button>'; }).join('') + '</div>';
    }
    if(dictAttribution==='wiktionary'){
      html += '<div class="dict-note">Definition from <a href="https://en.wiktionary.org/wiki/'+escapeAttr(dictQuery.trim().toLowerCase().replace(/\s+/g,'_'))+'" target="_blank" style="color:var(--crimson);font-weight:600;">Wiktionary</a> (CC BY-SA).</div>';
    }else if(dictAttribution==='ai'){
      html += '<div class="dict-note">Smart definition written for B1 learners. If a meaning looks unusual, check with your teacher.</div>';
    }
    html += '</div>';
  }

  if(!dictQuery.trim() && !dictLoading && !dictResult && !dictError){
    html += '<div class="empty-note">Type any English word to see its meaning, examples and pronunciation.</div>';
  }
  return html;
}

function renderSearch(){
  const flat = [];
  (function walk(pages, trail){
    pages.forEach(function(p){
      flat.push({id:p.id, title:p.title, icon:p.icon, trail:trail});
      if(p.children && p.children.length) walk(p.children, trail.concat([p.title]));
    });
  })(state.pages, []);
  const q = searchQuery.trim().toLowerCase();
  const results = q ? flat.filter(function(f){ return f.title.toLowerCase().indexOf(q)!==-1; }) : flat;
  return '' +
    '<div class="eyebrow" style="margin-bottom:4px;">Find anything</div>' +
    '<div class="big-title serif" style="margin-bottom:16px;">Search</div>' +
    '<div class="search-box"><span class="search-icon">'+iconHTML('search')+'</span>' +
    '<input class="search-input" type="text" placeholder="Search all pages…" value="'+escapeAttr(searchQuery)+'" oninput="onSearchInput(this.value)"/></div>' +
    '<div class="search-results">' +
      (results.length ? results.map(function(r){
        return '<div class="search-row" onclick="openFromSearch(\''+r.id+'\')">' +
          '<span class="icon-chip small">'+iconHTML(r.icon)+'</span>' +
          '<div><div class="search-title">'+escapeHtml(r.title)+'</div>' +
          '<div class="search-path">'+(escapeHtml(r.trail.join(' › '))||'Home')+'</div></div></div>';
      }).join('') : '<div class="empty-note">No pages match “'+escapeHtml(searchQuery)+'”.</div>') +
    '</div>';
}
function onSearchInput(v){
  searchQuery = v;
  render();

  if(inp){ inp.focus(); const len=inp.value.length; inp.setSelectionRange(len,len); }
}

  return html;
}

function renderBlocks(blocks, containerId){
  return blocks.map(function(b,i){ return renderBlock(b, blocks, i, containerId); }).join('');
}
function renderBlock(b, arr, i, containerId){
  const controls = editMode ? (
    '<div class="block-controls">' +
      (i>0 ? '<button onclick="moveBlock(\''+b.id+'\',-1)" title="Move up">↑</button>' : '') +
      (i<arr.length-1 ? '<button onclick="moveBlock(\''+b.id+'\',1)" title="Move down">↓</button>' : '') +
      (containerId!=='ROOT' ? '<button onclick="releaseFromToggle(\''+b.id+'\')" title="Move out of toggle, onto the page">⇤</button>' : '') +
      '<button onclick="startMoveBlock(\''+b.id+'\')" title="Move to another spot on the page">≡</button>' +
      '<button onclick="deleteBlock(\''+b.id+'\')" title="Delete">✕</button>' +
    '</div>'
  ) : '';
  let plain = '';
  if(b.type==='divider') plain = ' block-plain';
  else if(b.type==='callout') plain = ' block-callout';
  return '<div class="block'+plain+'">' + controls + renderBlockBody(b, containerId) + '</div>';
}
function listItemsHTML(b, marker){
  return b.items.map(function(it,idx){
    const lead = marker==='num' ? '<span class="num">'+(idx+1)+'.</span>' : '<span class="dot">•</span>';
    return '<div class="item-row">'+lead+
      '<div class="rich-field item-text" contenteditable="'+editMode+'" data-block-id="'+b.id+'" data-field="items" data-idx="'+idx+'" onfocus="onRichFocus(this)" oninput="onRichInput(this)" onblur="onRichBlur(this)">'+it+'</div>' +
      (editMode ? '<button class="item-del" onclick="deleteBulletItem(\''+b.id+'\','+idx+')">✕</button>' : '') +
    '</div>';
  }).join('') +
  (editMode ? '<span class="b-add-item" onclick="addBulletItem(\''+b.id+'\')">+ Add item</span>' : '');
}
function embedHTML(b, isAudio){
  const src = b.url ? convertDriveUrl(b.url) : null;
  return '<div class="b-embed">'+
    '<div class="embed-label"><span contenteditable="'+editMode+'" onkeydown="if(event.key===\'Enter\'){event.preventDefault();this.blur();}" oninput="onBlockField(\''+b.id+'\',\'label\',this.innerText)" onblur="render()">'+escapeHtml(b.label||(isAudio?'Untitled audio':'Untitled media'))+'</span><span class="embed-tag'+(isAudio?' audio-tag':' video-tag')+'">'+(isAudio?'Audio':'Video')+'</span></div>' +
    (src ? ('<iframe class="'+(isAudio?'audio-frame':'video-frame')+'" src="'+src+'" allow="autoplay" allowfullscreen></iframe>' +
      '<div class="embed-open-row"><a href="'+escapeAttr(b.url)+'" target="_blank" rel="noopener">Open in Google Drive ↗</a></div>') : '<div class="embed-empty">No link added yet.</div>') +
    (editMode ? ('<div class="embed-input"><input type="text" placeholder="'+(isAudio?'Paste a Google Drive link to an .mp3…':'Paste Google Drive share link…')+'" value="'+escapeAttr(b.url||'')+'" onblur="setEmbedUrl(\''+b.id+'\',this.value)" onkeydown="if(event.key===\'Enter\'){this.blur();}"/></div>') : '') +
  '</div>';
}
function imageBlockHTML(b){
  let body;
  if(!b.imgKey){
    body = '<div class="embed-empty">'+(editMode?'No image yet — upload one below. It will be compressed automatically.':'No image yet.')+'</div>';
  }else if(imageCache[b.imgKey] === 'ERR'){
    body = '<div class="embed-empty">This image could not be loaded.</div>';
  }else if(imageCache[b.imgKey]){
    body = '<img src="'+imageCache[b.imgKey]+'" alt="'+escapeAttr(b.label||'Image')+'"/>';
  }else{
    ensureImageLoaded(b.imgKey);
    body = '<div class="image-loading">Loading image…</div>';
  }
  return '<div class="b-image">' +
    '<div class="embed-label"><span contenteditable="'+editMode+'" onkeydown="if(event.key===\'Enter\'){event.preventDefault();this.blur();}" oninput="onBlockField(\''+b.id+'\',\'label\',this.innerText)" onblur="render()">'+escapeHtml(b.label||'Untitled image')+'</span><span class="embed-tag image-tag">Image</span></div>' +
    body +
    (editMode ? ('<div class="embed-input">' +
      '<input type="file" accept="image/png,image/jpeg,image/webp,image/gif" id="imgin-'+b.id+'" style="display:none" onchange="handleImageUpload(\''+b.id+'\',this)"/>' +
      '<button class="btn mini" onclick="document.getElementById(\'imgin-'+b.id+'\').click()">'+(b.imgKey?'Replace image':'Upload image')+'</button>' +
    '</div>') : '') +
  '</div>';
}
function renderBlockBody(b, containerId){
  switch(b.type){
    case 'heading': {
      const lvl = b.level || 1;
      return '<div class="rich-field b-heading-'+lvl+'" contenteditable="'+editMode+'" data-block-id="'+b.id+'" data-field="text" onfocus="onRichFocus(this)" oninput="onRichInput(this)" onblur="onRichBlur(this)">'+b.text+'</div>';
    }
    case 'text':
      return '<div class="rich-field b-text" contenteditable="'+editMode+'" data-block-id="'+b.id+'" data-field="text" onfocus="onRichFocus(this)" oninput="onRichInput(this)" onblur="onRichBlur(this)">'+b.text+'</div>';
    case 'divider':
      return '<hr class="b-divider"/>';
    case 'bulleted':
      return '<div class="b-bulleted">'+listItemsHTML(b,'dot')+'</div>';
    case 'numbered':
      return '<div class="b-bulleted">'+listItemsHTML(b,'num')+'</div>';
    case 'toggle':
      return '<div class="b-toggle '+(b.open?'open':'')+'">' +
        '<div class="toggle-head" onclick="toggleOpen(\''+b.id+'\')">' +
          '<span class="arrow">›</span>' +
          '<span class="toggle-title" contenteditable="'+editMode+'" onclick="event.stopPropagation()" onkeydown="if(event.key===\'Enter\'){event.preventDefault();this.blur();}" oninput="onBlockField(\''+b.id+'\',\'title\',this.innerText)" onblur="render()">'+escapeHtml(b.title)+'</span>' +
        '</div>' +
        (b.open ? ('<div class="toggle-body">'+renderBlocks(b.blocks,b.id)+(editMode?renderAddBlockControl(b.id):'')+'</div>') : '') +
      '</div>';
    case 'table':
      return '<table class="b-table"><thead><tr>' +
          b.headers.map(function(h,ci){
            return '<th contenteditable="'+editMode+'" onkeydown="if(event.key===\'Enter\'){event.preventDefault();this.blur();}" oninput="onTableHeaderInput(\''+b.id+'\','+ci+',this.innerText)" onblur="render()">'+escapeHtml(h)+'</th>';
          }).join('') +
        '</tr></thead><tbody>' +
          b.rows.map(function(row,ri){
            return '<tr>'+row.map(function(cell,ci){
              return '<td contenteditable="'+editMode+'" onkeydown="if(event.key===\'Enter\'){event.preventDefault();this.blur();}" oninput="onTableCellInput(\''+b.id+'\','+ri+','+ci+',this.innerText)" onblur="render()">'+escapeHtml(cell)+'</td>';
            }).join('')+'</tr>';
          }).join('') +
        '</tbody></table>' +
        (editMode ? ('<div class="table-actions"><span onclick="addTableRow(\''+b.id+'\')">+ Row</span><span onclick="addTableCol(\''+b.id+'\')">+ Column</span></div>') : '');
    case 'embed':
      return embedHTML(b, false);
    case 'audio':
      return embedHTML(b, true);
    case 'image':
      return imageBlockHTML(b);
    case 'callout':
      return calloutHTML(b);
    case 'quote':
      return quoteHTML(b);
  }
  return '';
}
const CALLOUT_COLORS = ['co-white','co-gray','co-yellow','co-red','co-green','co-blue','co-purple'];
const CALLOUT_EMOJIS = ['💡','⚠️','✅','📌','⭐','❓','🔑','📝','🔥','❤️'];
function calloutHTML(b){
  const color = b.color || 'co-yellow';
  const hasEmoji = b.emoji && b.emoji.length;
  let html = '<div class="b-callout '+color+(hasEmoji?'':' no-emoji')+'">' +
    (hasEmoji ? ('<span class="callout-emoji'+(editMode?'':' locked')+'"'+(editMode?' onclick="cycleCalloutEmoji(\''+b.id+'\')" title="Tap to change icon"':'')+'>'+escapeHtml(b.emoji)+'</span>') : '') +
    '<div class="b-callout-text rich-field" contenteditable="'+editMode+'" data-block-id="'+b.id+'" data-field="text" onfocus="onRichFocus(this)" oninput="onRichInput(this)" onblur="onRichBlur(this)">'+b.text+'</div>' +
  '</div>';
  if(editMode){
    html += '<div class="callout-toolbar">' +
      '<div class="callout-colorbar">' + CALLOUT_COLORS.map(function(c){
        return '<button class="callout-swatch '+c+' '+(color===c?'picked':'')+'" onclick="setCalloutColor(\''+b.id+'\',\''+c+'\')"></button>';
      }).join('') + '</div>' +
      '<button class="callout-emoji-toggle" onclick="toggleCalloutEmoji(\''+b.id+'\')">'+(hasEmoji?'Remove icon':'Add icon')+'</button>' +
    '</div>';
  }
  return html;
}
function quoteHTML(b){
  return '<div class="b-quote">' +
    '<div class="b-quote-text rich-field" contenteditable="'+editMode+'" data-block-id="'+b.id+'" data-field="text" onfocus="onRichFocus(this)" oninput="onRichInput(this)" onblur="onRichBlur(this)">'+b.text+'</div>' +
    ((editMode || (b.cite && b.cite.trim())) ? ('<div class="b-quote-cite rich-field" contenteditable="'+editMode+'" data-block-id="'+b.id+'" data-field="cite" data-placeholder="who said it" onfocus="onRichFocus(this)" oninput="onRichInput(this)" onblur="onRichBlur(this)">'+(b.cite||'')+'</div>') : '') +
  '</div>';
}
function cycleCalloutEmoji(id){
  const page = currentPage();
  const node = findBlockNode(page.blocks, id);
  const cur = CALLOUT_EMOJIS.indexOf(node.emoji);
  node.emoji = CALLOUT_EMOJIS[(cur+1) % CALLOUT_EMOJIS.length];
  persist(); render();
}
function toggleCalloutEmoji(id){
  const page = currentPage();
  const node = findBlockNode(page.blocks, id);
  node.emoji = (node.emoji && node.emoji.length) ? '' : '💡';
  persist(); render();
}
function setCalloutColor(id, color){
  const page = currentPage();
  const node = findBlockNode(page.blocks, id);
  node.color = color;
  persist(); render();
}
function renderAddBlockControl(containerId){
  return '<button class="btn ghost" onclick="toggleAddMenu(\''+containerId+'\')">+ Add block</button>';
}
function closeAddMenu(){ addMenuOpenFor = null; render(); }
function renderAddMenu(containerId){
  return '<div class="modal-overlay" onclick="if(event.target===this)closeAddMenu()">' +
    '<div class="modal modal-lg"><h3>Add a block</h3>' +
    '<div class="add-menu">' +
    '<button onclick="addBlockTo(\''+containerId+'\',\'heading1\')"><b>H1</b> Heading 1</button>' +
    '<button onclick="addBlockTo(\''+containerId+'\',\'heading2\')"><b>H2</b> Heading 2</button>' +
    '<button onclick="addBlockTo(\''+containerId+'\',\'heading3\')"><b>H3</b> Heading 3</button>' +
    '<button onclick="addBlockTo(\''+containerId+'\',\'text\')">'+iconHTML('document')+' Text</button>' +
    '<button onclick="addBlockTo(\''+containerId+'\',\'bulleted\')">• Bulleted list</button>' +
    '<button onclick="addBlockTo(\''+containerId+'\',\'numbered\')"><b>1·2</b> Numbered list</button>' +
    '<button onclick="addBlockTo(\''+containerId+'\',\'toggle\')">› Toggle</button>' +
    '<button onclick="addBlockTo(\''+containerId+'\',\'table\')">▦ Table</button>' +
    '<button onclick="addBlockTo(\''+containerId+'\',\'callout\')">💡 Callout box</button>' +
    '<button onclick="addBlockTo(\''+containerId+'\',\'quote\')"><b>&rdquo;</b> Quote</button>' +
    '<button onclick="addBlockTo(\''+containerId+'\',\'image\')">'+iconHTML('image')+' Image (upload)</button>' +
    '<button onclick="addBlockTo(\''+containerId+'\',\'embed\')">'+iconHTML('video')+' Video / file (Drive)</button>' +
    '<button onclick="addBlockTo(\''+containerId+'\',\'audio\')">'+iconHTML('headphones')+' Audio (Drive)</button>' +
    '<button onclick="addBlockTo(\''+containerId+'\',\'divider\')">— Divider</button>' +
    '</div>' +
    '<div class="modal-actions"><span></span><span class="right-group"><button class="btn" onclick="closeAddMenu()">Cancel</button></span></div>' +
    '</div></div>';
}
function renderNewPageModal(){
  const isTopLevel = !newPageParent;
  return '<div class="modal-overlay" onclick="if(event.target===this)closeNewPageModal()">' +
    '<div class="modal modal-lg"><h3>New page</h3>' +
    '<input class="new-page-title-input" type="text" placeholder="Page title" value="'+escapeAttr(newPageDraftTitle)+'" oninput="onNewPageDraftTitleInput(this.value)" onkeydown="if(event.key===\'Enter\'){event.preventDefault();confirmNewPage();}"/>' +
    (isTopLevel ? (
      '<div class="eyebrow" style="margin-bottom:6px;">Show under</div>' +
      '<div class="seg-row mb">' +
        '<button class="seg-btn '+(newPageDraftSection==='general'?'picked':'')+'" onclick="pickDraftSection(\'general\')">Course</button>' +
        '<button class="seg-btn '+(newPageDraftSection==='units'?'picked':'')+'" onclick="pickDraftSection(\'units\')">Units</button>' +
      '</div>'
    ) : '') +
    '<div class="eyebrow" style="margin-bottom:6px;">Choose an icon</div>' +
    '<div class="emoji-grid">'+ICON_LIST.map(function(it){ return '<button title="'+it.label+'" class="'+(it.id===newPageDraftIcon?'picked':'')+'" onclick="pickDraftIcon(\''+it.id+'\')">'+iconHTML(it.id)+'</button>'; }).join('')+'</div>' +
    '<div class="modal-actions"><span></span><span class="right-group"><button class="btn" onclick="closeNewPageModal()">Cancel</button><button class="btn primary" onclick="confirmNewPage()">Create page</button></span></div>' +
    '</div></div>';
}
function renderPinSetModal(){
  return '<div class="modal-overlay" onclick="if(event.target===this)closePinSetModal()">' +
    '<div class="modal"><h3>Teacher PIN</h3>' +
    '<div class="hint">Set a PIN students must enter before switching on Editing mode. Leave it blank and save to remove the PIN entirely.</div>' +
    '<input class="pin-set-input" type="text" inputmode="numeric" placeholder="e.g. 1234" value="'+escapeAttr(pinSetDraft)+'" oninput="onPinSetDraftInput(this.value)" onkeydown="if(event.key===\'Enter\'){event.preventDefault();savePinSet();}"/>' +
    '<div class="modal-actions"><span></span><span class="right-group"><button class="btn" onclick="closePinSetModal()">Cancel</button><button class="btn primary" onclick="savePinSet()">Save</button></span></div>' +
    '</div></div>';
}
function renderPinGateModal(){
  return '<div class="modal-overlay" onclick="if(event.target===this)cancelPinGate()">' +
    '<div class="modal"><h3>Enter Teacher PIN</h3>' +
    '<input class="pin-gate-input" type="text" inputmode="numeric" placeholder="PIN" value="" oninput="onPinGateInput(this.value)" onkeydown="if(event.key===\'Enter\'){event.preventDefault();confirmPinGate();}"/>' +
    (pinGateError ? '<div class="hint" style="color:#C24545;margin-top:-6px;">Incorrect PIN. Try again.</div>' : '') +
    '<div class="modal-actions"><span></span><span class="right-group"><button class="btn" onclick="cancelPinGate()">Cancel</button><button class="btn primary" onclick="confirmPinGate()">Unlock</button></span></div>' +
    '</div></div>';
}
function renderLinkModal(){
  return '<div class="modal-overlay" onclick="if(event.target===this)closeLinkModal()">' +
    '<div class="modal"><h3>Add link</h3>' +
    '<span class="link-modal-field">Link text</span>' +
    '<input class="link-text-input" type="text" placeholder="Words students will see" value="'+escapeAttr(linkDraftText)+'" oninput="onLinkTextInput(this.value)"/>' +
    '<span class="link-modal-field">Web address</span>' +
    '<input class="link-url-input" type="text" inputmode="url" placeholder="example.com" value="'+escapeAttr(linkDraftUrl)+'" oninput="onLinkUrlInput(this.value)" onkeydown="if(event.key===\'Enter\'){event.preventDefault();confirmLink();}"/>' +
    '<div class="hint">The link opens in a new tab. You can type just “example.com”.</div>' +
    '<div class="modal-actions"><span></span><span class="right-group"><button class="btn" onclick="closeLinkModal()">Cancel</button><button class="btn primary" onclick="confirmLink()">Add link</button></span></div>' +
    '</div></div>';
}
function renderMoveModal(){
  const page = currentPage();
  const moving = findBlockNode(page.blocks, moveBlockId);
  if(!moving) return '';
  const excludeIds = [];
  collectSubtreeIds(moving, excludeIds);
  const flat = [];
  flattenBlocksForMove(page.blocks, 0, flat, excludeIds);
  return '<div class="modal-overlay" onclick="if(event.target===this)cancelMoveBlock()">' +
    '<div class="modal modal-lg"><h3>Move block</h3>' +
    '<div class="hint">Moving: '+escapeHtml(blockPreviewLabel(moving))+'. Choose where it should go.</div>' +
    '<div class="move-target-list">' +
      '<button class="move-target" onclick="confirmMoveTo(null)">↥ Move to the very top of the page</button>' +
      flat.map(function(item){
        return '<button class="move-target" style="padding-left:'+(14+item.depth*16)+'px" onclick="confirmMoveTo(\''+item.id+'\')">↳ After: '+escapeHtml(item.label)+'</button>';
      }).join('') +
    '</div>' +
    '<div class="modal-actions"><span></span><span class="right-group"><button class="btn" onclick="cancelMoveBlock()">Cancel</button></span></div>' +
    '</div></div>';
}
function renderCustomizeModal(){
  const isUnit = customizeDraft.section==='units';
  let html = '<div class="modal-overlay" onclick="if(event.target===this)closeCustomize()">' +
    '<div class="modal modal-lg"><h3>Edit page</h3>' +
    '<div class="eyebrow" style="margin-bottom:6px;">Title</div>' +
    '<input type="text" value="'+escapeAttr(customizeDraft.title)+'" oninput="onCustomizeTitleInput(this.value)"/>' +
    (isUnit ? '<div class="hint">Tip: keep the format “Unit 4 — Name” so the unit number badge shows correctly on the homepage.</div>' : '') +
    '<div class="eyebrow" style="margin-bottom:6px;">Icon</div>' +
    '<div class="emoji-grid">'+ICON_LIST.map(function(it){ return '<button title="'+it.label+'" class="'+(it.id===customizeDraft.icon?'picked':'')+'" onclick="setCustomizeIcon(\''+it.id+'\')">'+iconHTML(it.id)+'</button>'; }).join('')+'</div>';
  if(customizeDraft.isTopLevel){
    html += '<div class="eyebrow" style="margin-bottom:6px;">Show under</div>' +
      '<div class="seg-row mb">' +
        '<button class="seg-btn '+(customizeDraft.section!=='units'?'picked':'')+'" onclick="setCustomizeSection(\'general\')">Course</button>' +
        '<button class="seg-btn '+(customizeDraft.section==='units'?'picked':'')+'" onclick="setCustomizeSection(\'units\')">Units</button>' +
      '</div>' +
      '<div class="hint">Moving a page places it at the bottom of its new section. Units always stay in number order.</div>';
  }
  html += '<div class="eyebrow" style="margin-bottom:6px;">Colour</div>' +
    '<div class="color-grid">' +
      GRADIENTS.map(function(g){ return '<button class="color-swatch '+g+' '+(customizeDraft.colorFamily===g?'picked':'')+'" onclick="setCustomizeColor(\''+g+'\')"></button>'; }).join('') +
      '<button class="color-swatch auto-swatch '+(!customizeDraft.colorFamily?'picked':'')+'" onclick="setCustomizeColor(\'auto\')">Auto</button>' +
    '</div>' +
    '<div class="eyebrow" style="margin-bottom:6px;">Cover image (optional)</div>' +
    '<input type="text" placeholder="Paste an image link (e.g. Google Drive)…" value="'+escapeAttr(customizeDraft.cover||'')+'" oninput="onCustomizeCoverInput(this.value)"/>' +
    '<div class="modal-actions">' +
      '<button class="btn danger-ghost" onclick="deleteFromCustomize()">Delete page</button>' +
      '<span class="right-group"><button class="btn" onclick="closeCustomize()">Cancel</button><button class="btn primary" onclick="saveCustomize()">Save</button></span>' +
    '</div>' +
    '</div></div>';
  return html;
}
