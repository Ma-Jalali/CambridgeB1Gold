function dictPosGroups(){
  var posGroups = [];
  if(!dictResult) return posGroups;
  dictResult.forEach(function(en){
    (en.meanings||[]).forEach(function(m){
      var pos = (m.partOfSpeech||'').toLowerCase();
      var g = null;
      for(var gi=0; gi<posGroups.length; gi++){ if(posGroups[gi].pos===pos){ g = posGroups[gi]; break; } }
      if(!g){ g = {pos:pos, defs:[]}; posGroups.push(g); }
      (m.definitions||[]).forEach(function(d){ g.defs.push(d); });
    });
  });
  /* Most common part of speech first (real corpus data) */
  if(dictMeta && dictMeta.posOrder && dictMeta.posOrder.length && posGroups.length>1){
    posGroups.sort(function(a,b){
      var ia = dictMeta.posOrder.indexOf(a.pos); if(ia===-1) ia = 99;
      var ib = dictMeta.posOrder.indexOf(b.pos); if(ib===-1) ib = 99;
      return ia - ib;
    });
  }
  if(/(?:ed|ing)$/i.test((dictQuery||'').trim()) && posGroups.length>1){
    posGroups.sort(function(a,b){ return (a.pos==='adjective'?0:1) - (b.pos==='adjective'?0:1); });
  }

}
function dictCardFront(g, multi){
  var w = (dictResult && dictResult[0] && dictResult[0].word) || dictQuery.trim();
  return (multi && g.pos) ? (w + ' (' + g.pos + ')') : w;
}
function addCardFromDictPos(gIdx){
  var groups = dictPosGroups();
  var g = groups[gIdx];

  var multi = groups.length > 1;
  var d = (g.defs||[]).filter(function(x){ return x.definition; })[0];
  if(!d){ alert('No definition to save yet.'); return; }

  var back = ((multi && g.pos) ? ('('+g.pos+') ') : '') + d.definition + (d.example ? ('\n\u201C'+d.example+'\u201D') : '');
  if(addMyCard(front, back)) render();
}

function importMyCards(input){

  reader.onload = function(){
    let added = 0, skipped = 0;
    try{
      const arr = JSON.parse(reader.result);
      if(!Array.isArray(arr)) throw new Error('bad');
      arr.forEach(function(c){
        const front = String((c&&c.front)||'').trim();
        const back = String((c&&c.back)||'').trim();
        if(!front || !back){ skipped++; return; }
        if(cardFrontExists(front)){ skipped++; return; }
        myCards.push({ cid: uid(), front: front, back: back, created: c.created||Date.now(),
          box: (typeof c.box==='number' && c.box>=0 && c.box<=4) ? c.box : 0,
          due: (typeof c.due==='number') ? c.due : Date.now(),
          reps: c.reps||0 });
        added++;
      });
      persistCards(); render();
      alert(added+' card'+(added===1?'':'s')+' imported'+(skipped?(' \u00B7 '+skipped+' skipped (duplicate or empty)'):'')+'.');
    }catch(e){

    }

  };

}

/* ================= tree helpers ================= */
function findPage(pages, id){
  for(const p of pages){
    if(p.id===id) return p;
    if(p.children && p.children.length){ const f=findPage(p.children,id); if(f) return f; }
  }
  return null;
}
function findPageParentLoc(pages, id){
  for(let i=0;i<pages.length;i++){
    if(pages[i].id===id) return {arr:pages, idx:i};
    if(pages[i].children && pages[i].children.length){ const f=findPageParentLoc(pages[i].children,id); if(f) return f; }
  }
  return null;
}
function findBlockNode(blocks, id){
  for(const b of blocks){
    if(b.id===id) return b;
    if(b.type==='toggle'){ const f=findBlockNode(b.blocks,id); if(f) return f; }
  }
  return null;
}
function findBlockParentArray(blocks, id){
  for(let i=0;i<blocks.length;i++){
    if(blocks[i].id===id) return blocks;
    if(blocks[i].type==='toggle'){ const f=findBlockParentArray(blocks[i].blocks,id); if(f) return f; }
  }
  return null;
}
function findBlockLocation(blocks, id, ancestors){
  ancestors = ancestors || [];
  for(let i=0;i<blocks.length;i++){
    if(blocks[i].id===id) return { arr: blocks, idx: i, ancestors: ancestors };
    if(blocks[i].type==='toggle'){
      const found = findBlockLocation(blocks[i].blocks, id, ancestors.concat([blocks[i]]));
      if(found) return found;
    }
  }
  return null;
}
function releaseFromToggle(blockId){
  const page = currentPage();
  const loc = findBlockLocation(page.blocks, blockId, []);
  if(!loc || !loc.ancestors.length) return;
  const parentToggle = loc.ancestors[loc.ancestors.length-1];
  const block = loc.arr.splice(loc.idx, 1)[0];
  const grandAncestors = loc.ancestors.slice(0, -1);
  const targetArr = grandAncestors.length ? grandAncestors[grandAncestors.length-1].blocks : page.blocks;
  const toggleIdx = targetArr.findIndex(function(b){ return b.id===parentToggle.id; });
  targetArr.splice(toggleIdx+1, 0, block);
  persist(); render();
}
function startMoveBlock(blockId){ moveBlockId = blockId; moveTargetPageId = null; moveChoosingPage = false; render(); }
function cancelMoveBlock(){ moveBlockId = null; moveTargetPageId = null; moveChoosingPage = false; render(); }

function collectSubtreeIds(block, out){

function flattenBlocksForMove(blocks, depth, out, excludeIds){
  blocks.forEach(function(b){
    if(excludeIds.indexOf(b.id)!==-1) return;

/* ================= image compression & upload ================= */
function compressImageFile(file, maxW, quality, cb){
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = function(){
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0,0,w,h);
      ctx.drawImage(img, 0, 0, w, h);
      cb(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = function(){ alert('That file could not be read as an image.'); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function handleImageUpload(blockId, input){
  const file = input.files && input.files[0];
  if(!file) return;
  compressImageFile(file, 1000, 0.78, function(dataUrl){
    const key = 'img-'+uid();
    window.storage.set(key, dataUrl, true).then(function(){
      const page = currentPage();
      const node = findBlockNode(page.blocks, blockId);
      if(!node) return;
      if(node.imgKey){ deleteImgKeys([node.imgKey]); }
      node.imgKey = key;
      imageCache[key] = dataUrl;
      persist(); render();
    }).catch(function(){
      alert('The image could not be saved. It may be too large — try a smaller photo.');
    });
  });
}

function ensureImageLoaded(key){
  if(imageCache[key] || imagePending[key]) return;
  imagePending[key] = true;
  window.storage.get(key, true).then(function(res){
    imageCache[key] = res.value;
    delete imagePending[key];
    render();
  }).catch(function(){
    imageCache[key] = 'ERR';
    delete imagePending[key];
    render();
  });
}

/* ================= backup / restore ================= */
async function exportBackup(){
  try{
    const bundle = { state: state, images: {} };
    try{
      const listed = await window.storage.list('img-', true);
      const keys = (listed && listed.keys) ? listed.keys : [];
      for(const k of keys){
        const keyName = typeof k === 'string' ? k : k.key;
        try{
          const res = await window.storage.get(keyName, true);
          bundle.images[keyName] = res.value;
        }catch(e){}
      }
    }catch(e){}
    const blob = new Blob([JSON.stringify(bundle)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'class-hub-backup-'+new Date().toISOString().slice(0,10)+'.json';
    a.click();
  }catch(e){
    alert('Backup failed: '+e.message);
  }
}
function handleImportFile(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(e){
    try{
      const data = JSON.parse(e.target.result);
      const newState = data.state || data;
      if(!newState.pages || !Array.isArray(newState.pages)) throw new Error('Not a valid backup file.');
      if(!confirm('Replace ALL current content with this backup? This cannot be undone.')) return;
      state = newState;
      migrate();
      // A deliberate restore must always win over whatever is in the database.
      // Sync our known revision to the stored one so the version guard lets it through.
      try{
        const cur = await window.storage.get('page-tree', true);
        const remote = JSON.parse(cur.value);
        loadedRev = (remote.rev || 0);
      }catch(e){ loadedRev = (state.rev || 0); }
      await persist();
      if(data.images){
        for(const k in data.images){
          try{ await window.storage.set(k, data.images[k], true); imageCache[k]=data.images[k]; }catch(err){}
        }
      }
      render();
      alert('Backup restored.');
    }catch(err){
      alert('Could not import: '+err.message);
    }
  };
  reader.readAsText(file);
}

  if(m = url.match(/\/document\/d\/([^/]+)/)) return 'https://docs.google.com/document/d/'+m[1]+'/preview';
  if(m = url.match(/\/spreadsheets\/d\/([^/]+)/)) return 'https://docs.google.com/spreadsheets/d/'+m[1]+'/preview';
  if(m = url.match(/\/presentation\/d\/([^/]+)/)) return 'https://docs.google.com/presentation/d/'+m[1]+'/preview';
  if(m = url.match(/[?&]id=([^&]+)/)) return 'https://drive.google.com/file/d/'+m[1]+'/preview';
  return url;
}

async function lookupWord(w){
  w = (w||'').trim();
  if(!w) return;

    try{

      const sug = await sr.json();

/* -ing words that are real nouns in their own right (meeting = an event,
   not just "the act of meeting"). Searching these shows the word itself —
   NO redirect to the base verb. Teachers: add words here whenever a
   redirect feels wrong for your students. */
const ING_NOUN_KEEP = ['meeting','feeling','building','wedding','morning','evening',
  'painting','drawing','clothing','housing','beginning','ending','meaning','warning',
  'training','ceiling','pudding','lightning','dumpling','sibling','darling'];

/* Pull the base verb out of definitions like "present participle of listen"
   or "past tense of think". */
function extractBaseVerb(){
  var base = null;
  (dictResult||[]).forEach(function(en){
    (en.meanings||[]).forEach(function(m){
      (m.definitions||[]).forEach(function(d){
        if(base) return;
        var mt = String(d.definition||'').match(/(?:participle|gerund|tense)\s+(?:and\s+past\s+participle\s+)?of\s+(?:the\s+verb\s+)?([a-z\-']+)/i);
        if(mt) base = mt[1].toLowerCase();
      });
    });
  });
  return base;
}
/* listening -> listen | making -> make | running -> run */
function ingBaseCandidates(q){
  var stem = q.slice(0, -3);
  var out = [];
  if(stem.length >= 2){
    out.push(stem);
    out.push(stem + 'e');
    if(stem.length >= 3 && stem[stem.length-1] === stem[stem.length-2]) out.push(stem.slice(0, -1));
  }
  return out;
}
async function fetchEntryWithVerb(word){
  try{
    var r = await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(word));
    if(!r.ok) return null;
    var data = await r.json();
    if(!Array.isArray(data) || !data.length) return null;
    var hasVerb = data.some(function(en){
      return (en.meanings||[]).some(function(m){ return (m.partOfSpeech||'').toLowerCase()==='verb'; });
    });
    return hasVerb ? data : null;
  }catch(e){ return null; }
}
function filterMeanings(keepFn){
  dictResult = dictResult.map(function(en){
    var copy = {};
    for(var k in en){ if(Object.prototype.hasOwnProperty.call(en,k)) copy[k] = en[k]; }
    copy.meanings = (en.meanings||[]).filter(keepFn);
    return copy;
  }).filter(function(en){ return en.meanings && en.meanings.length; });
}
/* Shapes the raw lookup for B1 learners:
   - "excited"  (-ed, adjective exists)  -> adjective shown, verb sense hidden
   - "exciting" (-ing, adjective exists) -> adjective ONLY (gerund noun + verb
     hidden), with a small "also the -ing form of excite" note
   - "listening" (-ing, pure gerund)     -> redirected to the verb "listen",
     like Longman
   - "eating"   (no adjective, no clean base found) -> shown as-is
   - ING_NOUN_KEEP words ("meeting")     -> shown as the noun, no redirect */
async function refineDictResult(){
  dictRedirect = null; dictAlsoVerb = null;
  if(!dictResult || !dictResult.length) return;
  var q = (dictQuery||'').trim().toLowerCase();
  var isIng = /ing$/.test(q), isEd = /ed$/.test(q);
  if(!isIng && !isEd) return;
  var hasAdj = dictResult.some(function(en){
    return (en.meanings||[]).some(function(m){ return (m.partOfSpeech||'').toLowerCase()==='adjective'; });
  });
  if(isIng && ING_NOUN_KEEP.indexOf(q) !== -1){
    /* real noun like "meeting": keep noun (and adjective), hide the bare participle verb line */
    var hasOther = dictResult.some(function(en){
      return (en.meanings||[]).some(function(m){ return (m.partOfSpeech||'').toLowerCase()!=='verb'; });
    });
    if(hasOther) filterMeanings(function(m){ return (m.partOfSpeech||'').toLowerCase()!=='verb'; });
    return;
  }
  if(hasAdj){
    var base = isIng ? extractBaseVerb() : null;
    filterMeanings(function(m){
      var p = (m.partOfSpeech||'').toLowerCase();
      if(p==='verb') return false;
      if(isIng && p==='noun') return false; /* the -ing noun is just the gerund */
      return true;
    });
    if(isIng){
      if(!base){
        var cands = ingBaseCandidates(q);
        if(cands.length) base = cands[0];
      }
      dictAlsoVerb = base || null;
    }
    return;
  }
  if(!isIng) return;
  /* No adjective: this -ing word is probably a pure gerund (listening).
     Try to find the base verb and show that entry instead. */
  var candidates = [];
  var fromDef = extractBaseVerb();
  if(fromDef) candidates.push(fromDef);
  ingBaseCandidates(q).forEach(function(c){ if(candidates.indexOf(c)===-1) candidates.push(c); });
  for(var i=0;i<candidates.length;i++){
    var data = await fetchEntryWithVerb(candidates[i]);
    if(data){
      dictResult = data;
      dictAttribution = null;
      dictRedirect = { from: q, to: (data[0].word || candidates[i]) };
      return;
    }
  }
}
/* ---- real-usage part-of-speech data (Datamuse, corpus-based) ----
   Longman-style behavior: "happy" is only ever used as an adjective in
   real English, so the rare noun/verb senses from Wiktionary are removed.
   When a word is genuinely both (need, fine, fire), the MORE COMMON part
   of speech is shown first. */
async function fetchWordMeta(w){
  try{
    var r = await fetch('https://api.datamuse.com/words?sp='+encodeURIComponent(w)+'&md=pf&max=1');
    if(!r.ok) return null;
    var arr = await r.json();
    if(!Array.isArray(arr) || !arr.length) return null;
    var item = arr[0];
    if(String(item.word||'').toLowerCase() !== w.toLowerCase()) return null;
    var posOrder = [], freq = null;
    (item.tags||[]).forEach(function(t){
      if(t==='n' && posOrder.indexOf('noun')===-1) posOrder.push('noun');
      else if(t==='v' && posOrder.indexOf('verb')===-1) posOrder.push('verb');
      else if(t==='adj' && posOrder.indexOf('adjective')===-1) posOrder.push('adjective');
      else if(t==='adv' && posOrder.indexOf('adverb')===-1) posOrder.push('adverb');
      else if(t.indexOf('f:')===0) freq = parseFloat(t.slice(2));
    });
    return { posOrder: posOrder, freq: isNaN(freq) ? null : freq };
  }catch(e){ return null; }
}
async function applyWordMeta(){
  dictMeta = null;
  if(!dictResult || !dictResult[0]) return;
  var w = String(dictResult[0].word || dictQuery || '').trim().toLowerCase();
  if(!w) return;
  var meta = await fetchWordMeta(w);
  if(!meta) return;
  dictMeta = meta;
  /* Drop parts of speech that real usage doesn't support — but only for
     words common enough that the corpus data is trustworthy, and never
     for POS types Datamuse can't tag (prepositions, interjections…). */
  var TAGGABLE = ['noun','verb','adjective','adverb'];
  if(meta.posOrder.length && meta.freq !== null && meta.freq >= 0.3){
    var somethingSurvives = false;
    dictResult.forEach(function(en){ (en.meanings||[]).forEach(function(m){
      var p = (m.partOfSpeech||'').toLowerCase();
      if(TAGGABLE.indexOf(p)===-1 || meta.posOrder.indexOf(p)!==-1) somethingSurvives = true;
    }); });
    if(somethingSurvives){
      filterMeanings(function(m){
        var p = (m.partOfSpeech||'').toLowerCase();
        return TAGGABLE.indexOf(p)===-1 || meta.posOrder.indexOf(p)!==-1;
      });
    }
  }
}
/* ---- make the entry learner-friendly ----
   Wiktionary definitions can be far above B1 ("having a feeling arising
   from a consciousness of well-being…"). After the entry is shown, every
   displayed definition is quietly rewritten in simple B1 English, and any
   definition without an example sentence gets one. Real example sentences
   that already exist are kept. */
async function ensureExamples(){
  if(dictAttribution==='ai') return false; /* AI definitions are already B1-simple with examples */
  if(!dictResult || !dictResult[0]) return false;
  var w = String(dictResult[0].word || dictQuery || '').trim();
  var items = [];
  dictPosGroups().forEach(function(g){
    g.defs.slice(0,4).forEach(function(d){
      if(d.definition) items.push({d:d, pos:g.pos});
    });
  });
  if(!items.length) return false;
  items = items.slice(0,10);
  var lines = items.map(function(it,i){
    return (i+1)+'. ('+(it.pos||'')+') '+it.d.definition;
  }).join('\n');
  var response = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:1500,
      messages:[{role:'user', content:
        'You simplify dictionary definitions for B1 (intermediate) English learners.\n' +
        'Word: "'+w.replace(/"/g,'')+'"\n' +
        'For each numbered definition below:\n' +
        'a) Rewrite it in simple, clear English that a B1 learner understands. Max 18 words. Keep the meaning accurate. Use everyday vocabulary only.\n' +
        'b) Write ONE natural example sentence using the word with that meaning. Max 14 words, simple B1 vocabulary.\n' +
        'DEFINITIONS:\n' + lines + '\n' +
        'Reply ONLY with minified JSON, no markdown fences, no other text: {"items":[{"d":"simple definition","e":"example sentence"},...]} in the same order as the numbered list.'
      }]
    })
  });
  if(!response.ok) return false;
  var data = await response.json();
  var text = (data.content||[]).filter(function(c){ return c.type==='text'; }).map(function(c){ return c.text; }).join('');
  var parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
  var out = parsed.items || [];
  var changed = false;
  items.forEach(function(it,i){
    var o = out[i];
    if(!o) return;
    if(o.d && String(o.d).trim()){
      it.d.origDefinition = it.d.definition;   /* original kept, in case a teacher needs it */
      it.d.definition = String(o.d).trim();
      changed = true;
    }
    if(!it.d.example && o.e && String(o.e).trim()){
      it.d.example = String(o.e).trim();
      changed = true;
    }
  });
  if(changed) dictSimplified = true;
  return changed;
}

async function tryAiDict(w){
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:1000,
      messages:[{role:'user', content:
        'You are a learner\'s dictionary for B1 (intermediate) English students. Define: "'+w.replace(/"/g,'')+'"\n' +
        'Reply ONLY with minified JSON, no markdown fences, no other text.\n' +
        'If it is a real English word, phrase, phrasal verb or idiom:\n' +

        'Rules: max 3 meanings, max 3 definitions per meaning, exactly 1 example per definition, max 6 synonyms total, definitions must use simple B1-level vocabulary.\n' +
        'If the word is an -ed or -ing form that exists as an ADJECTIVE in English (excited, exciting, bored, interesting, tired…), define the ADJECTIVE only — do NOT define the base verb.\n' +
        'If the word is only the -ing (gerund) form of a verb, with no adjective meaning and no independent noun meaning (e.g. "listening"), define the base VERB instead and set "word" to that base verb (e.g. "listen"). But real -ing nouns like meeting, building, wedding keep their own noun definition.\n' +
        'If it is NOT a real English word or phrase:\n' +
        '{"found":false,"suggestions":["up to 5 real English words the student probably meant"]}'
      }]
    })
  });
  if(!response.ok) return false;
  const data = await response.json();
  const text = (data.content||[]).filter(function(c){ return c.type==='text'; }).map(function(c){ return c.text; }).join('');
  const clean = text.replace(/```json|```/g,'').trim();
  const parsed = JSON.parse(clean);
  if(parsed.found){
    dictResult = [{
      word: parsed.word || w.toLowerCase(),
      phonetic: parsed.phonetic || '',
      phonetics: [],
      meanings: (parsed.meanings||[]).map(function(m){
        return {
          partOfSpeech: m.partOfSpeech || '',
          definitions: (m.definitions||[]).map(function(d){ return {definition:d.definition||'', example:d.example||''}; }).filter(function(d){ return d.definition; }),
          synonyms: m.synonyms || []
        };
      }).filter(function(m){ return m.definitions.length; })
    }];
    if(!dictResult[0].meanings.length) return false;
    dictAttribution = 'ai';
    addRecentWord(w);
    return true;
  }
  if(parsed.suggestions && parsed.suggestions.length){
    dictSuggestions = parsed.suggestions.slice(0,6);
    dictError = 'No entry found for “'+w+'”. Did you mean one of these?';
    return true;

function stripHtml(s){
  return String(s||'')
    .replace(/<[^>]*>/g,'')
    .replace(/&nbsp;/g,' ')
    .replace(/&amp;/g,'&')
    .replace(/&lt;/g,'<')
    .replace(/&gt;/g,'>')
    .replace(/&#39;/g,"'")
    .replace(/&quot;/g,'"')
    .replace(/\s+/g,' ')
    .trim();
}
async function wiktionaryLookup(w){
  const title = encodeURIComponent(w.trim().toLowerCase().replace(/\s+/g,'_'));
  const r = await fetch('https://en.wiktionary.org/api/rest_v1/page/definition/'+title+'?redirect=true');
  if(!r.ok) return null;
  const data = await r.json();
  const sections = data.en;
  if(!sections || !sections.length) return null;
  const meanings = [];
  sections.slice(0,5).forEach(function(sec){
    const defs = (sec.definitions||[]).map(function(d){
      const text = stripHtml(d.definition);
      let example = '';
      if(d.parsedExamples && d.parsedExamples.length) example = stripHtml(d.parsedExamples[0].example);
      else if(d.examples && d.examples.length) example = stripHtml(d.examples[0]);
      return {definition:text, example:example};
    }).filter(function(d){ return d.definition; });
    if(defs.length) meanings.push({partOfSpeech:(sec.partOfSpeech||'').toLowerCase(), definitions:defs, synonyms:[]});
  });
  if(!meanings.length) return null;
  return [{word:w.trim().toLowerCase(), phonetic:'', phonetics:[], meanings:meanings}];
}

function toggleLinePrefix(kind){
  const el = document.activeElement;
  if(!el || !el.classList || !el.classList.contains('b-text')) return;
  const sel = window.getSelection();
  if(!sel || !sel.rangeCount || typeof sel.modify !== 'function') return;
  const PRE = {h1:'# ', h2:'## ', h3:'### ', ul:'* ', dash:'- ', dia:'~ ', ol:'1. ', task:'[] '};
  try{
    sel.modify('move','backward','lineboundary');
    for(let i=0;i<7;i++) sel.modify('extend','forward','character');
    const sample = sel.toString();
    sel.collapseToStart();
    let existing=null, len=0, m;
    if(/^###\s/.test(sample)){ existing='h3'; len=4; }
    else if(/^##\s/.test(sample)){ existing='h2'; len=3; }
    else if(/^#\s/.test(sample)){ existing='h1'; len=2; }
    else if(/^\[\]\s/.test(sample)){ existing='task'; len=3; }
    else if(/^\*\s/.test(sample) || /^\u2022\s/.test(sample)){ existing='ul'; len=2; }
    else if(/^-\s/.test(sample)){ existing='dash'; len=2; }
    else if(/^~\s/.test(sample)){ existing='dia'; len=2; }
    else if(m = sample.match(/^(\d{1,3})[.)]\s/)){ existing='ol'; len=m[0].length; }
    if(existing){
      for(let i=0;i<len;i++) sel.modify('extend','forward','character');
      document.execCommand('delete', false, null);
      if(existing===kind){ syncFromElement(el); scheduleSave(); return; }
    }
    document.execCommand('insertText', false, PRE[kind]);
  }catch(e){}

function normalizeUrl(u){

  if(!u) return '';
  if(/^(https?:|mailto:)/i.test(u)) return u;
  return 'https://'+u;
}
function confirmLink(){

  const text = (linkDraftText||'').trim() || url;
  const anchor = '<a href="'+escapeAttr(url)+'" target="_blank" rel="noopener">'+escapeHtml(text)+'</a>';
  const sel = window.getSelection();
  if(savedLinkRange){
    sel.removeAllRanges();
    sel.addRange(savedLinkRange);
  }
  try{
    if(linkHadSelection){
      document.execCommand('insertHTML', false, anchor);
    }else{
      document.execCommand('insertHTML', false, anchor+'&nbsp;');

  }catch(e){}
  const active = document.activeElement;
  if(active && active.dataset && active.dataset.blockId) syncFromElement(active);

const _posterJpegCache = {};
function _applyPoster(v, uri){
  v.setAttribute('poster', uri);
  const root = v.closest('.plyr');
  if(root){
    const pos = root.querySelector('.plyr__poster');
    if(pos) pos.style.backgroundImage = 'url("'+uri+'")';
  }
}
function rasterizePoster(v){
  const label = v.getAttribute('data-plabel') || 'Class video';
  const portrait = v.getAttribute('data-orient')==='portrait';
  const key = (portrait?'P|':'L|')+label;
  if(_posterJpegCache[key]){ _applyPoster(v, _posterJpegCache[key]); return; }
  const img = new Image();
  img.onload = function(){
    try{
      const w = portrait?1440:2560, h = portrait?2560:1440;
      const cv = document.createElement('canvas');
      cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      const jpg = cv.toDataURL('image/jpeg', 0.86);
      _posterJpegCache[key] = jpg;
      _applyPoster(v, jpg);
    }catch(e){}
  };
  img.src = clipPosterURI(label, portrait);
}
function initClipPlayers(){
  document.querySelectorAll('video.js-player').forEach(function(v){
    if(typeof Plyr!=='undefined' && !v.closest('.plyr')){
      try{
        new Plyr(v, {
          controls:['play-large','play','progress','current-time','duration','mute','volume','settings','fullscreen'],
          settings:['speed'],
          resetOnEnd:true
        });
      }catch(e){}
    }
    rasterizePoster(v);
  });
}

function renderDictionary(){
  let html = '' +
    '<div class="eyebrow" style="margin-bottom:4px;">English–English</div>' +
    '<div class="big-title serif" style="margin-bottom:16px;">Dictionary</div>' +
    '<div class="dict-search-row">' +
      '<div class="search-box"><span class="search-icon">'+iconHTML('search')+'</span>' +
      '<input class="search-input" id="dictInput" type="text" placeholder="Look up a word…" value="'+escapeAttr(dictQuery)+'" onkeydown="if(event.key===\'Enter\'){lookupWord(this.value);}"/></div>' +
      '<button class="dict-go" onclick="lookupFromInput()">Go</button>' +
    '</div>';
  if(dictRecent.length){
    html += '<div class="recent-chips">' + dictRecent.map(function(w){
      return '<button class="recent-chip" onclick="lookupWord(\''+escapeAttr(w)+'\')">'+escapeHtml(w)+'</button>';
    }).join('') + '</div>';
  }
  if(dictLoading){
    html += '<div class="empty-note">Looking up “'+escapeHtml(dictQuery)+'”…</div>';
  }
  if(dictError){
    html += '<div class="dict-card"><div style="font-size:14px;line-height:1.6;">'+escapeHtml(dictError)+'</div>' +
      (dictSuggestions.length ? ('<div class="eyebrow" style="margin:12px 0 8px;">Did you mean</div><div class="recent-chips" style="margin-bottom:2px;">' +
        dictSuggestions.map(function(s){ return '<button class="recent-chip" onclick="lookupWord(\''+escapeAttr(s)+'\')">'+escapeHtml(s)+'</button>'; }).join('') + '</div>') : '') +
    '</div>';
  }
  if(dictResult){
    const entry = dictResult[0];
    const phon = entry.phonetic || (entry.phonetics||[]).map(function(p){return p.text;}).filter(Boolean)[0] || '';
    const audioObj = (entry.phonetics||[]).filter(function(p){ return p.audio; })[0];
    html += '<div class="dict-card">' +
      (dictRedirect ? ('<div class="dict-redirect">\u201C'+escapeHtml(dictRedirect.from)+'\u201D is the <b>-ing form</b> of the verb <b>'+escapeHtml(dictRedirect.to)+'</b>:</div>') : '') +
      '<div class="dict-word-row">' +
        '<span class="dict-word">'+escapeHtml(entry.word)+'</span>' +
        (phon ? '<span class="dict-phon">'+escapeHtml(phon)+'</span>' : '') +
        (audioObj ? '<button class="dict-audio-btn" onclick="playAudio(\''+escapeAttr(audioObj.audio)+'\')" title="Pronounce">▶</button>' : '<button class="dict-audio-btn" onclick="speakWord(\''+escapeAttr(entry.word)+'\')" title="Pronounce">▶</button>') +
      '</div>';
    /* One section per part of speech, Longman-style. Each has its own
       "+ Card" so students can save exactly the meaning they need. */
    var posGroups = dictPosGroups();
    var multiPos = posGroups.length>1;
    posGroups.forEach(function(g, gIdx){
      var front = dictCardFront(g, multiPos);
      var cardBtn = cardFrontExists(front)
        ? '<span class="dict-card-saved">\u2713 In my cards</span>'
        : '<button class="dict-card-btn" onclick="addCardFromDictPos('+gIdx+')" title="Save this meaning to my flashcards">+ Card</button>';
      html += '<div class="dict-homograph'+(gIdx===0?' first':' dict-homograph-sep')+'">' +
        (multiPos ? ('<span class="dict-homograph-word">'+escapeHtml(entry.word)+'<sup class="dict-sup">'+(gIdx+1)+'</sup></span>') : '') +
        '<span class="pos-tag">'+escapeHtml(g.pos)+'</span>' +
        '<span style="flex:1;"></span>' + cardBtn +
      '</div>';
      g.defs.slice(0,4).forEach(function(d, di){
        html += '<div class="def-item"><span class="def-num">'+(di+1)+'</span>'+escapeHtml(d.definition||'') +
          (d.example ? '<span class="def-example">“'+escapeHtml(d.example)+'”</span>' : '') +
        '</div>';
      });
    });
    if(dictAlsoVerb){
      html += '<div class="dict-note">\u201C'+escapeHtml(entry.word)+'\u201D is also the -ing form of the verb <span class="dict-verb-link" onclick="lookupWord(\''+escapeAttr(dictAlsoVerb)+'\')">'+escapeHtml(dictAlsoVerb)+'</span>.</div>';
    }
    var syns = [];
    dictResult.forEach(function(en){ (en.meanings||[]).forEach(function(m){
      (m.synonyms||[]).forEach(function(s){ if(syns.indexOf(s)===-1) syns.push(s); });
      (m.definitions||[]).forEach(function(d){ (d.synonyms||[]).forEach(function(s){ if(syns.indexOf(s)===-1) syns.push(s); }); });
    }); });
    if(syns.length){
      html += '<div class="eyebrow" style="margin:14px 0 8px;">Similar words — tap to look up</div><div class="recent-chips" style="margin-bottom:2px;">' +
        syns.slice(0,8).map(function(s){ return '<button class="recent-chip" onclick="lookupWord(\''+escapeAttr(s)+'\')">'+escapeHtml(s)+'</button>'; }).join('') + '</div>';
    }
    if(dictSimplified){
      html += '<div class="dict-note">Definitions rewritten in simple English for B1 learners. If a meaning looks unusual, check with your teacher.</div>';
    }
    if(dictAttribution==='wiktionary'){
      html += '<div class="dict-note">Definition from <a href="https://en.wiktionary.org/wiki/'+escapeAttr(dictQuery.trim().toLowerCase().replace(/\s+/g,'_'))+'" target="_blank" style="color:var(--crimson);font-weight:600;">Wiktionary</a> (CC BY-SA).</div>';
    }else if(dictAttribution==='ai'){
      html += '<div class="dict-note">Smart definition written for B1 learners. If a meaning looks unusual, check with your teacher.</div>';
    }
    html += '</div>';
  }

  if(!dictQuery.trim() && !dictLoading && !dictResult && !dictError){
    html += '<div class="empty-note">Type any English word to see its meaning, examples and pronunciation.</div>';
  }
  return html;
}

function renderSearch(){
  const flat = [];
  (function walk(pages, trail){
    pages.forEach(function(p){
      flat.push({id:p.id, title:p.title, icon:p.icon, trail:trail});
      if(p.children && p.children.length) walk(p.children, trail.concat([p.title]));
    });
  })(state.pages, []);
  const q = searchQuery.trim().toLowerCase();
  const results = q ? flat.filter(function(f){ return f.title.toLowerCase().indexOf(q)!==-1; }) : flat;
  return '' +
    '<div class="eyebrow" style="margin-bottom:4px;">Find anything</div>' +
    '<div class="big-title serif" style="margin-bottom:16px;">Search</div>' +
    '<div class="search-box"><span class="search-icon">'+iconHTML('search')+'</span>' +
    '<input class="search-input" type="text" placeholder="Search all pages…" value="'+escapeAttr(searchQuery)+'" oninput="onSearchInput(this.value)"/></div>' +
    '<div class="search-results">' +
      (results.length ? results.map(function(r){
        return '<div class="search-row" onclick="openFromSearch(\''+r.id+'\')">' +
          '<span class="icon-chip small">'+iconHTML(r.icon)+'</span>' +
          '<div><div class="search-title">'+escapeHtml(r.title)+'</div>' +
          '<div class="search-path">'+(escapeHtml(r.trail.join(' › '))||'Home')+'</div></div></div>';
      }).join('') : '<div class="empty-note">No pages match “'+escapeHtml(searchQuery)+'”.</div>') +
    '</div>';
}

function renderBlocks(blocks, containerId){
  return blocks.map(function(b,i){ return renderBlock(b, blocks, i, containerId); }).join('');
}
function renderBlock(b, arr, i, containerId){
  const controls = editMode ? (
    '<div class="block-controls">' +
      (i>0 ? '<button onclick="moveBlock(\''+b.id+'\',-1)" title="Move up">↑</button>' : '') +
      (i<arr.length-1 ? '<button onclick="moveBlock(\''+b.id+'\',1)" title="Move down">↓</button>' : '') +
      (containerId!=='ROOT' ? '<button onclick="releaseFromToggle(\''+b.id+'\')" title="Move out of toggle, onto the page">⇤</button>' : '') +
      '<button onclick="startMoveBlock(\''+b.id+'\')" title="Move to another spot on the page">≡</button>' +
      '<button onclick="deleteBlock(\''+b.id+'\')" title="Delete">✕</button>' +
    '</div>'
  ) : '';
  let plain = '';
  if(b.type==='divider') plain = ' block-plain';
  else if(b.type==='callout') plain = ' block-callout';
  else if(b.type==='quiz') plain = ' block-quiz-host';
  return '<div class="block'+plain+'">' + controls + renderBlockBody(b, containerId) + '</div>';
}

function romanNum(n){
  const R=[[1000,'m'],[900,'cm'],[500,'d'],[400,'cd'],[100,'c'],[90,'xc'],[50,'l'],[40,'xl'],[10,'x'],[9,'ix'],[5,'v'],[4,'iv'],[1,'i']];
  let s=''; R.forEach(function(p){ while(n>=p[0]){ s+=p[1]; n-=p[0]; } });
  return s;
}
function matchLabel(style, i){
  if(style==='num') return String(i+1);
  if(style==='roman') return romanNum(i+1);
  return String.fromCharCode(65+i);
}

function setQuizStart(id, val){

function countGaps(raw){
  const re = /\[([^\]]*)\]/g; let n=0;
  while(re.exec(raw)) n++;
  return n;
}
function nl2br(s){ return escapeHtml(s).replace(/\n/g,'<br>'); }
function fmtInline(s){
  // escape first, then convert **bold** and *italic* (and __/_ ) markers, then newlines
  let out = escapeHtml(s);
  out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  out = out.replace(/__([^_]+)__/g, '<strong>$1</strong>');
  out = out.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  out = out.replace(/(^|[^_])_([^_\n]+)_(?!_)/g, '$1<em>$2</em>');
  out = out.replace(/\n/g,'<br>');
  return out;
}

      num += Math.max(gc,1);

      const style = q.labelStyle||'alpha';

          '</span>'+
        '</div>';
      });
      h += (q.matchOrder==='items-first') ? (itemsHTML + boxHTML) : (boxHTML + itemsHTML);
      num += Math.max(nItems,1);
    }else{
      h += '<div class="quiz-prompt-view"><span class="quiz-qnum">'+num+'</span>'+fmtInline(q.prompt||'')+'</div>';
      const multi = (q.correct||[]).length>1;
      (q.options||[]).forEach(function(opt, oi){
        h += '<label class="quiz-opt" data-oi="'+oi+'" onclick="pickQuizOpt(this,'+(multi?'true':'false')+')">'+

function checkQuiz(id){
  const node = findBlockNode(currentPage().blocks, id);
  const root = document.querySelector('.b-quiz[data-quiz="'+id+'"]');
  if(!node || !root) return;
  let correctCount = 0, total = 0;
  node.questions.forEach(function(q){
    const qEl = root.querySelector('.quiz-q[data-qid="'+q.qid+'"]');
    if(!qEl) return;
    qEl.classList.add('answered');
    let ok = true;
    if(q.kind==='match'){
      const style = q.labelStyle||'alpha';
      const sels = qEl.querySelectorAll('.match-sel');
      sels.forEach(function(sel, i){
        const picked = parseInt(sel.value,10);
        const want = (q.answers||[])[i];
        const good = (want!=null && want>=0 && picked===want);
        sel.classList.toggle('match-right', good);
        sel.classList.toggle('match-wrong', !good);
        sel.disabled = true;
        total++;
        if(good){ correctCount++; }
        else{
          ok = false;
          const wrap = sel.parentNode;
          const ans = wrap && wrap.querySelector('.match-ans');
          if(ans && want!=null && want>=0){
            ans.textContent = matchLabel(style, want);
            ans.style.display = 'block';
          }
        }
      });
    }else if(q.kind==='gap'){
      const gaps = gapAnswersFor(q.prompt||'');
      const rawGaps = gapRawFor(q.prompt||'');
      const inputs = qEl.querySelectorAll('.quiz-gap');
      inputs.forEach(function(inp, i){
        const val = (inp.value||'').trim().toLowerCase();
        const accepted = gaps[i]||[];
        const good = accepted.indexOf(val)>=0;
        inp.classList.toggle('gap-right', good);
        inp.classList.toggle('gap-wrong', !good);
        inp.disabled = true;
        total++;
        if(good){ correctCount++; }
        else{
          ok = false;
          const wrap = inp.parentNode;
          const ans = wrap && wrap.querySelector('.quiz-gap-answer');
          if(ans){
            const first = (rawGaps[i]||[])[0] || '';
            ans.textContent = first;
            ans.style.display = 'inline';
          }
        }
      });
    }else{
      const correct = (q.correct||[]).slice().sort().join(',');
      const picked = [];
      qEl.querySelectorAll('.quiz-opt').forEach(function(o){
        const oi = parseInt(o.getAttribute('data-oi'),10);
        const isCorrect = (q.correct||[]).indexOf(oi)>=0;
        const isPicked = o.classList.contains('picked');
        if(isPicked) picked.push(oi);
        o.classList.toggle('opt-correct', isCorrect);
        if(isPicked && !isCorrect) o.classList.add('opt-wrong');
      });
      if(picked.slice().sort().join(',') !== correct) ok = false;
      total++;
      if(ok) correctCount++;
    }
    if(ok){ qEl.classList.add('q-right'); }
    else{ qEl.classList.add('q-wrong'); }
    const exp = qEl.querySelector('.quiz-explain-view');
    if(exp && !ok && (q.explain||'').trim()){
      exp.innerHTML = fmtInline(q.explain);
      exp.style.display = 'block';
    }
  });
  const score = root.querySelector('.quiz-score');
  if(score){ score.textContent = correctCount+' / '+total+' correct'; score.style.display='inline-block';
    score.className = 'quiz-score '+(correctCount===total?'all-right':'some-wrong'); }
  if(correctCount === total && total > 0) fireConfetti();
}

function renderTextLines(html){
  const host = document.createElement('div');
  host.innerHTML = html || '';
  const lines = [];
  let buf = '', started = false;
  function flush(){ lines.push(buf); buf=''; started=false; }
  Array.from(host.childNodes).forEach(function(n){
    if(n.nodeType===1 && (n.tagName==='DIV'||n.tagName==='P')){
      if(started) flush();
      lines.push(n.innerHTML);
    } else if(n.nodeType===1 && n.tagName==='BR'){
      flush();
    } else {
      buf += (n.nodeType===1 ? n.outerHTML : escapeHtml(n.textContent));
      started = true;
    }
  });
  if(started) flush();
  if(!lines.length) lines.push('');
  const TAGS = '((?:<[^>]*>|\\s|&nbsp;)*)';
  return lines.map(function(l){
    let m;
    const bareLine = l.replace(/<[^>]*>/g,'').replace(/&nbsp;/g,' ').trim();
    if(bareLine==='---' || bareLine==='***' || bareLine==='___') return '<div class="tl tl-rule"><hr class="tl-divider"/></div>';
    if(m = l.match(new RegExp('^'+TAGS+'###\\s+([\\s\\S]*)$'))) return '<div class="tl tl-h3">'+m[1]+m[2]+'</div>';
    if(m = l.match(new RegExp('^'+TAGS+'##\\s+([\\s\\S]*)$')))  return '<div class="tl tl-h2">'+m[1]+m[2]+'</div>';
    if(m = l.match(new RegExp('^'+TAGS+'#\\s+([\\s\\S]*)$')))   return '<div class="tl tl-h1">'+m[1]+m[2]+'</div>';
    if(m = l.match(new RegExp('^'+TAGS+'\\[\\]\\s+([\\s\\S]*)$'))) return '<div class="tl tl-task" onclick="toggleTask(this)"><span class="tl-check" role="checkbox" aria-checked="false"></span><span class="tl-body tl-task-body">'+m[1]+m[2]+'</span></div>';
    if(m = l.match(new RegExp('^'+TAGS+'~\\s+([\\s\\S]*)$'))) return '<div class="tl tl-li"><span class="tl-dia">\u25C6</span><span class="tl-body">'+m[1]+m[2]+'</span></div>';
    if(m = l.match(new RegExp('^'+TAGS+'-\\s+([\\s\\S]*)$'))) return '<div class="tl tl-li"><span class="tl-dash">\u2013</span><span class="tl-body">'+m[1]+m[2]+'</span></div>';
    if(m = l.match(new RegExp('^'+TAGS+'[*\u2022]\\s+([\\s\\S]*)$'))) return '<div class="tl tl-li"><span class="tl-dot">\u2022</span><span class="tl-body">'+m[1]+m[2]+'</span></div>';
    if(m = l.match(new RegExp('^'+TAGS+'(\\d{1,3})[.)]\\s+([\\s\\S]*)$'))) return '<div class="tl tl-li"><span class="tl-num">'+m[2]+'.</span><span class="tl-body">'+m[1]+m[3]+'</span></div>';
    const bare = l.replace(/<br\s*\/?>/gi,'').replace(/<[^>]*>/g,'').replace(/&nbsp;/g,' ').trim();
    if(bare==='') return '<div class="tl tl-blank"></div>';
    return '<div class="tl">'+l+'</div>';
  }).join('');
}

function calloutHTML(b){

      '<div class="callout-colorbar">' + CALLOUT_COLORS.map(function(c){

function cycleCalloutEmoji(id){
